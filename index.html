    const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

    // ─── Icones SVG (Lucide) ─────────────────────────────────────────
    // Composant Icon : affiche une icone Lucide inline via la librairie globale.
    // Usage : h(Icon, { name: "wrench", size: 16, color: "#6d28d9" })
    // Convertit kebab-case en PascalCase pour lucide.icons
    function toPascalCase(str) {
      return str.split("-").map(function(s) { return s.charAt(0).toUpperCase() + s.slice(1); }).join("");
    }
    function Icon({ name, size = 16, color = "currentColor", style: s, className }) {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = "";
          try {
            const pascalName = toPascalCase(name);
            const svgStr = lucide.icons[pascalName] || lucide.icons[name];
            if (svgStr) {
              const tmp = document.createElement("div");
              tmp.innerHTML = lucide.createElement(svgStr).outerHTML;
              const svg = tmp.firstChild;
              svg.setAttribute("width", String(size));
              svg.setAttribute("height", String(size));
              svg.setAttribute("stroke", color);
              svg.style.display = "inline-block";
              svg.style.verticalAlign = "middle";
              svg.style.flexShrink = "0";
              ref.current.appendChild(svg);
            }
          } catch(e) {}
        }
      }, [name, size, color]);
      return h("span", { ref, style: { display: "inline-flex", alignItems: "center", lineHeight: 0, ...s }, className });
    }

    // ─── Formateurs texte ─────────────────────────────────────────────
    // Immatriculation NC : "123456NC" → "123 456 NC"
    function formatImmatNC(val) {
      if (!val) return val;
      var raw = val.replace(/\s+/g, "").toUpperCase();
      if (/^\d{6}NC$/.test(raw)) return raw.slice(0, 3) + " " + raw.slice(3, 6) + " NC";
      if (/^\d{3,6}NC?$/i.test(raw)) return raw;
      return val;
    }
    // Premiere lettre majuscule, reste minuscule
    function capitalizeFirst(val) {
      if (!val || typeof val !== "string") return val;
      return val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
    }
    // Tri naturel A-Z puis 1-100 (chiffres extraits)
    function naturalSort(a, b) {
      var sa = String(a || "").toLowerCase();
      var sb = String(b || "").toLowerCase();
      return sa.localeCompare(sb, "fr", { numeric: true, sensitivity: "base" });
    }
    function sortByField(arr, field) {
      return arr.slice().sort(function(a, b) { return naturalSort(a[field], b[field]); });
    }

    // ─── Formateurs (nombres + devise) ──────────────────────────────────
    const fmtNum = (n) => {

      return new Intl.NumberFormat("fr-FR", { maximumFractionDigits: 0 }).format(Math.round(v));
    };
    const fmtMoney = (n) => fmtNum(n) + " XPF";

    // ─── Mappers (DB snake_case <-> UI PascalCase) ──────────────────────
    const STATUT_EQ_TO_UI = { actif: "En service", en_panne: "En panne", en_maintenance: "En maintenance", reforme: "Reforme" };
    const STATUT_EQ_TO_DB = { "En service": "actif", "En panne": "en_panne", "En maintenance": "en_maintenance", "Reforme": "reforme" };
    const STATUT_INT_TO_UI = { termine: "Termine", en_cours: "En cours", planifie: "Planifiee", pas_fait: "Pas fait" };
    const STATUT_INT_TO_DB = { "Termine": "termine", "En cours": "en_cours", "Planifiee": "planifie", "Pas fait": "pas_fait" };
    const STATUT_PLAN_TO_UI = { actif: "Actif", en_retard: "En retard", suspendu: "Suspendu", inactif: "Suspendu" };
    const STATUT_PLAN_TO_DB = { "Actif": "actif", "En retard": "en_retard", "Suspendu": "suspendu" };

    function equipementFromDb(r) {
      var extra = {};
      try { if (r.notes) extra = JSON.parse(r.notes); } catch(e) { extra = { _text: r.notes }; }
      return { Id: r.id, Title: r.immatriculation || "", Nom: r.nom || "", Type: r.type || "", Categorie: r.categorie === "vl" ? "Vehicule" : "Engin", Localisation: r.localisation || "", Horametre: String(r.horametre_actuel ?? 0), KM: String(r.km_actuel ?? 0), Statut: STATUT_EQ_TO_UI[r.statut] || "En service", DateMiseEnService: r.date_mise_en_service || "", Marque: r.marque || "", Modele: r.modele || "", Annee: r.annee || null, DernierEntretienH: String(extra.dernierEntretienH ?? ""), DernierEntretienKM: String(extra.dernierEntretienKM ?? ""), Notes: extra._text || "" };
    }
    function equipementToDb(e) {
      var notesObj = {};
      if (e.DernierEntretienH) notesObj.dernierEntretienH = parseFloat(e.DernierEntretienH) || 0;
      if (e.DernierEntretienKM) notesObj.dernierEntretienKM = parseFloat(e.DernierEntretienKM) || 0;
      if (e.Notes) notesObj._text = e.Notes;
      var notesStr = Object.keys(notesObj).length > 0 ? JSON.stringify(notesObj) : null;
      return { immatriculation: e.Title, nom: e.Nom, type: e.Type, categorie: e.Categorie === "Vehicule" ? "vl" : "engin", localisation: e.Localisation, horametre_actuel: parseFloat(e.Horametre) || 0, km_actuel: parseFloat(e.KM) || 0, statut: STATUT_EQ_TO_DB[e.Statut] || "actif", date_mise_en_service: e.DateMiseEnService || null, marque: e.Marque || null, modele: e.Modele || null, annee: e.Annee ? parseInt(e.Annee) : null, notes: notesStr };
    }
    function interventionFromDb(r) {
      return { Id: r.id, Title: r.titre || "", Equipement: r._equipement_code || "", EquipementId: r.equipement_id, Date_Intervention: r.date_intervention || "", Technicien: r.technicien || "", Statut_Intervention: STATUT_INT_TO_UI[r.statut] || "Planifiee", Travaux_Effectues: r.travaux_effectues || r.description || "", Temps_Arret: r.temps_arret || "", Cout: String(r.cout_total ?? ""), Plan: r.plan_nom || "", Horametre: r.horametre != null ? String(r.horametre) : "", KM: r.km != null ? String(r.km) : "", Type: r.type === "preventive" ? "Preventive" : "Curative", CycleNumber: r.cycle_number != null ? r.cycle_number : null };
    }
    function interventionToDb(i, equipementIdByCode) {
      return { equipement_id: i.EquipementId || equipementIdByCode[i.Equipement] || null, titre: i.Title, technicien: i.Technicien, date_intervention: i.Date_Intervention, statut: STATUT_INT_TO_DB[i.Statut_Intervention] || "planifie", travaux_effectues: i.Travaux_Effectues, temps_arret: i.Temps_Arret, cout_total: parseFloat(i.Cout) || 0, plan_nom: i.Plan, horametre: i.Horametre !== "" ? parseFloat(i.Horametre) : null, km: i.KM !== "" ? parseFloat(i.KM) : null, type: i.Type === "Preventive" ? "preventive" : "curative", description: i.Travaux_Effectues || i.Title, cycle_number: i.CycleNumber != null ? parseInt(i.CycleNumber) : null };
    }
    function planFromDb(r) {
      var desc = r.description || "";
      var extra = {};
      try { extra = JSON.parse(desc); } catch(e) { extra = { _text: desc }; }
      return { Id: r.id, Title: r.nom || "", Frequence: r.frequence_label || ((r.type_recurrence === "horametre" ? "Horametre " : r.type_recurrence === "km" ? "KM " : "") + r.frequence), Description: extra._text || "", SeuilAlerte: String(extra.seuilAlerte ?? 50), Equipements: r.equipements_codes || "", ProchainIntervention: r.prochaine_execution_date || "", Statut: STATUT_PLAN_TO_UI[r.statut] || "Actif" };
    }
    function planToDb(p) {
      const freq = p.Frequence || "";
      let type_rec = "horametre", freq_num = 0;
      const m = freq.match(/([0-9]+)/);
      if (m) freq_num = parseInt(m[1]);
      if (/km/i.test(freq)) type_rec = "km";
      else if (/jour|semain|mois|trimest|annu/i.test(freq)) type_rec = "date";
      var descObj = {};
      if (p.Description) descObj._text = p.Description;
      descObj.seuilAlerte = parseInt(p.SeuilAlerte) || 50;
      var descStr = JSON.stringify(descObj);
      return { nom: p.Title, description: descStr, frequence_label: p.Frequence, equipements_codes: p.Equipements, prochaine_execution_date: p.ProchainIntervention || null, statut: STATUT_PLAN_TO_DB[p.Statut] || "actif", type_recurrence: type_rec, frequence: freq_num || 1 };
    }
    function pieceFromDb(r) {
      return { Id: r.id, Reference: r.reference || "", Designation: r.designation || "", Categorie: r.categorie || "", Fournisseur: r.fournisseur || "", PrixUnitaire: String(r.prix_unitaire ?? 0), Stock: String(r.stock_actuel ?? 0), StockMin: String(r.stock_minimum ?? 0), Emplacement: r.emplacement || "", Compatible: r.compatible || "" };
    }
    function pieceToDb(p) {

    function releveFromDb(r, eqCodeById) {

    function releveToDb(r, equipementIdByCode) {

    }

    // ─── Conversion DB: chantiers, declarations, renouvellements, app_users ─
    function chantierFromDb(r) {
      return { id: r.id, titre: r.titre || "", dateDebut: r.date_debut || "", dateFin: r.date_fin || "", metrage: r.metrage || 0, prixMetre: r.prix_metre || 0, depensesPrevues: r.depenses_prevues || 0, statut: r.statut || "A venir", site: r.site || "" };
    }
    function chantierToDb(c) {
      return { titre: c.titre, date_debut: c.dateDebut || null, date_fin: c.dateFin || null, metrage: parseInt(c.metrage) || 0, prix_metre: parseInt(c.prixMetre) || 0, depenses_prevues: parseInt(c.depensesPrevues) || 0, statut: c.statut || "A venir", site: c.site || "" };
    }
    function declarationFromDb(r) {
      return { id: r.id, titre: r.titre || "", montant: r.montant || 0, recurrence: r.recurrence || "Mensuel", status: r.status || "A venir", dateFait: r.date_fait || null, dateEcheance: r.date_echeance || null };
    }
    function declarationToDb(d) {
      return { titre: d.titre, montant: parseInt(d.montant) || 0, recurrence: d.recurrence || "Mensuel", status: d.status || "A venir", date_fait: d.dateFait || null, date_echeance: d.dateEcheance || null };

      return { id: r.id, titre: r.titre || "", dateExpiration: r.date_expiration || "", delaiAlerte: r.delai_alerte || 60, status: r.status || "Valide" };
    }
    function renouvellementToDb(r) {
      return { titre: r.titre, date_expiration: r.dateExpiration || null, delai_alerte: parseInt(r.delaiAlerte) || 60, status: r.status || "Valide" };
    }
    function appUserFromDb(r) {
      return { id: r.id, nom: r.nom || "", email: r.email || "", role: r.role || "Utilisateur", statut: r.statut || "Actif", pagesAutorisees: r.pages_autorisees || ["accueil"], dateCreation: r.date_creation || "", derniereConnexion: r.derniere_connexion || null };
    }
    function appUserToDb(u) {
      return { nom: u.nom, email: u.email, role: u.role || "Utilisateur", statut: u.statut || "Actif", pages_autorisees: u.pagesAutorisees || ["accueil"], date_creation: u.dateCreation || new Date().toISOString().substring(0, 10) };
    }

    // ─── Conversion DB: affectations, paliers_primes ──────────────────
    function affectationFromDb(r) {
      return { id: r.id, personnelId: r.personnel_id, chantierId: r.chantier_id, dateAffectation: r.date_affectation, typeJour: r.type_jour || "travail" };
    }
    function affectationToDb(a) {
      return { personnel_id: a.personnelId, chantier_id: a.chantierId, date_affectation: a.dateAffectation };
    }
    function palierFromDb(r) {
      return { id: r.id, site: r.site || "", seuilMh: parseFloat(r.seuil_mh) || 0, coefficient: parseInt(r.coefficient) || 0, objectifMh: parseFloat(r.objectif_mh) || 0, moyenneJour: parseFloat(r.moyenne_jour) || 0 };
    }

    // ─── Lookup coefficient from paliers ────────────────────────────────
    function lookupCoefficient(pals, site, mhRealise) {
      if (!pals || !pals.length) return 0;
      var sitePaliers = pals.filter(function(p) { return p.site === site; });
      if (sitePaliers.length === 0) return 0;
      sitePaliers.sort(function(a, b) { return a.seuilMh - b.seuilMh; });
      var coef = 0;
      for (var i = 0; i < sitePaliers.length; i++) {
        if (mhRealise >= sitePaliers[i].seuilMh) {
          coef = sitePaliers[i].coefficient;
        }
      }
      return coef;
    }
    function getObjectifForSite(pals, site) {
      if (!pals || !pals.length) return 0;
      var sitePaliers = pals.filter(function(p) { return p.site === site; });
      if (sitePaliers.length === 0) return 0;
      return sitePaliers[0].objectifMh || 0;
    }
    function getAvailableSites(pals) {
      if (!pals || !pals.length) return [];
      var sites = [];
      pals.forEach(function(p) {
        if (sites.indexOf(p.site) < 0) sites.push(p.site);
      });
      return sites;
    }

    function getMoyenneForSite(pals, site) {
      if (!pals || !pals.length || !site) return 0;
      var sitePalier = pals.find(function(p) { return p.site === site; });
      return sitePalier ? sitePalier.moyenneJour || 0 : 0;
    }

    // ─── Helpers saisie (valeur peut etre un objet {valeur, typeJour} ou un nombre) ──
    function getSaisieVal(entry) {
      if (entry === null || entry === undefined) return 0;
      if (typeof entry === "object") return entry.valeur || 0;
      return entry || 0;
    }
    function getSaisieType(entry) {
      if (entry === null || entry === undefined) return "normal";
      if (typeof entry === "object") return entry.typeJour || "normal";
      return "normal";
    }

    // ─── Contexte global ────────────────────────────────────────────────
    const AppContext = createContext();
    function useAppData() { return useContext(AppContext); }
    function useParams(categorie) {
      const { parametres } = useAppData();
      const list = (parametres || []).filter((p) => p.categorie === categorie).sort((a, b) => (a.ordre || 0) - (b.ordre || 0));

    // ─── Helper : calcul des visites preventives en retard ──────────────
    // Pour chaque plan (horametre) lie a l'equipement, on calcule combien
    // de cycles de visite ont ete atteints par l'horametre actuel, et on
    // soustrait le nombre d'interventions preventives deja faites.
    function computeVisitesADeclencher(eq, plans, interventions) {
      if (!eq) return 0;
      const eqCode = (eq.Title || "").toLowerCase();
      const horam = parseFloat(eq.Horametre || 0);
      const km = parseFloat(eq.KM || 0);
      const baseH = parseFloat(eq.DernierEntretienH || 0);
      const baseKM = parseFloat(eq.DernierEntretienKM || 0);

      // 1ere passe : collecter les plans en retard avec leur frequence
      var duePlans = [];
      plans.forEach((p) => {
        if (p.Statut === "Suspendu") return;
        const concerne = !p.Equipements || p.Equipements.toLowerCase().includes(eqCode) || p.Equipements.toLowerCase().includes("tous");
        if (!concerne) return;
        const freq = p.Frequence || "";
        const matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
        const matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);
        let freqVal = 0;
        let cyclesAtteints = 0;
        let cyclesBase = 0;
        let freqType = "";
        if (matchH) {
          freqVal = parseInt(matchH[1]);
          if (freqVal > 0) { cyclesAtteints = Math.floor(horam / freqVal); cyclesBase = Math.floor(baseH / freqVal); freqType = "h"; }
        } else if (matchK) {
          freqVal = parseInt(matchK[1]);
          if (freqVal > 0) { cyclesAtteints = Math.floor(km / freqVal); cyclesBase = Math.floor(baseKM / freqVal); freqType = "km"; }
        } else return;
        if (freqVal === 0) return;
        const maxCompleted = interventions.filter((i) =>
          i.Type === "Preventive" &&
          (i.EquipementId === eq.Id || i.Equipement === eq.Title) &&
          (i.Plan || "").toLowerCase() === p.Title.toLowerCase() &&
          i.Statut_Intervention === "Termine"
        ).reduce((a, i) => Math.max(a, parseInt(i.CycleNumber || 0)), cyclesBase);
        if (cyclesAtteints > maxCompleted) {
          duePlans.push({ freqVal: freqVal, freqType: freqType });
        }
      });

      // Deduplique par frequence (si le meme equipement matche 2 fois le meme plan)
      var seen = {};
      var uniqueDuePlans = [];
      duePlans.forEach(function(dp) {
        var key = dp.freqType + "_" + dp.freqVal;
        if (!seen[key]) { seen[key] = true; uniqueDuePlans.push(dp); }
      });

      // Hierarchie : si un plan plus gros est aussi en retard, les petits sont absorbes
      var count = 0;
      uniqueDuePlans.forEach(function(dp) {
        var absorbed = uniqueDuePlans.some(function(other) {
          return other.freqType === dp.freqType && other.freqVal > dp.freqVal && other.freqVal % dp.freqVal === 0;
        });
        if (!absorbed) count++;
      });
      return count;
    }

    // Alertes anticipees : plans qui ne sont pas encore dus mais proches du seuil
    function computeAlertesAnticipees(eq, plans, interventions) {
      if (!eq) return [];
      const eqCode = (eq.Title || "").toLowerCase();
      const horam = parseFloat(eq.Horametre || 0);
      const km = parseFloat(eq.KM || 0);
      const baseH = parseFloat(eq.DernierEntretienH || 0);
      const baseKM = parseFloat(eq.DernierEntretienKM || 0);
      var alertes = [];
      plans.forEach(function(p) {
        if (p.Statut === "Suspendu") return;
        var concerne = !p.Equipements || p.Equipements.toLowerCase().includes(eqCode) || p.Equipements.toLowerCase().includes("tous");
        if (!concerne) return;
        var freq = p.Frequence || "";
        var matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
        var matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);
        var freqVal = 0, freqType = "", currentVal = 0, cyclesBase = 0;
        if (matchH) { freqVal = parseInt(matchH[1]); freqType = "h"; currentVal = horam; cyclesBase = Math.floor(baseH / freqVal); }
        else if (matchK) { freqVal = parseInt(matchK[1]); freqType = "km"; currentVal = km; cyclesBase = Math.floor(baseKM / freqVal); }
        else return;
        if (freqVal === 0) return;
        var cyclesAtteints = Math.floor(currentVal / freqVal);
        var maxCompleted = interventions.filter(function(i) {
          return i.Type === "Preventive" && (i.EquipementId === eq.Id || i.Equipement === eq.Title) && (i.Plan || "").toLowerCase() === p.Title.toLowerCase() && i.Statut_Intervention === "Termine";
        }).reduce(function(a, i) { return Math.max(a, parseInt(i.CycleNumber || 0)); }, cyclesBase);
        // Si deja du, pas d'alerte anticipee (c'est gere par computeVisitesADeclencher)
        if (cyclesAtteints > maxCompleted) return;
        // Prochain seuil
        var prochainCycle = maxCompleted + 1;
        var prochainSeuil = prochainCycle * freqVal;
        var seuil = parseInt(p.SeuilAlerte || 50);
        var reste = prochainSeuil - currentVal;
        if (reste > 0 && reste <= seuil) {
          alertes.push({ plan: p.Title, freqVal: freqVal, freqType: freqType, prochainSeuil: prochainSeuil, reste: Math.round(reste), unite: freqType === "h" ? "h" : "km" });
        }
      });
      // Hierarchie : si un plan plus gros a aussi une alerte au meme seuil, absorber le petit
      var result = [];
      alertes.forEach(function(a) {
        var absorbed = alertes.some(function(other) {
          return other.freqType === a.freqType && other.freqVal > a.freqVal && other.freqVal % a.freqVal === 0 && other.prochainSeuil === a.prochainSeuil;
        });
        if (!absorbed) result.push(a);
      });
      return result;
    }

    // ─── Graphique lineaire SVG ────────────────────────────────────────
    function LineChart({ data, color, unit, title }) {
      // data: [{ date, value }] trie par date ascendante
      if (!data || data.length < 2) return null;
      const W = 640, H = 220, pad = { t: 28, r: 16, b: 36, l: 60 };
      const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
      const values = data.map((d) => Number(d.value) || 0);
      const minV = Math.min(...values), maxV = Math.max(...values);
      const rng = Math.max(1, maxV - minV);
      const low = minV - rng * 0.05, high = maxV + rng * 0.05, span = high - low;
      const x = (i) => pad.l + (i / (data.length - 1)) * innerW;
      const y = (v) => pad.t + innerH - ((v - low) / span) * innerH;
      const pts = data.map((d, i) => x(i) + "," + y(d.value)).join(" ");
      const area = "M" + pad.l + "," + (pad.t + innerH) + " L" + data.map((d, i) => x(i) + "," + y(d.value)).join(" L") + " L" + (pad.l + innerW) + "," + (pad.t + innerH) + " Z";
      const yTicks = 4;
      const yTickVals = Array.from({ length: yTicks + 1 }, (_, i) => low + (span * i) / yTicks);
      const every = Math.max(1, Math.floor(data.length / 6));
      return h("div", { style: { width: "100%", overflowX: "auto" } },
        h("svg", { viewBox: `0 0 ${W} ${H}`, style: { width: "100%", maxWidth: 800, height: "auto", display: "block" } },
          title && h("text", { x: pad.l, y: 16, fontSize: 13, fontWeight: 700, fill: "#1f2937" }, title),
          // Grille horizontale
          yTickVals.map((v, i) => h("g", { key: i },
            h("line", { x1: pad.l, x2: pad.l + innerW, y1: y(v), y2: y(v), stroke: "#e5e7eb", strokeWidth: 1 }),
            h("text", { x: pad.l - 8, y: y(v) + 4, fontSize: 10, fill: "#6b7280", textAnchor: "end" }, fmtNum(v) + (unit || "")))),
          // Zone sous la courbe
          h("path", { d: area, fill: color, opacity: 0.12 }),
          // Ligne
          h("polyline", { points: pts, fill: "none", stroke: color, strokeWidth: 2.5 }),
          // Points + labels X
          data.map((d, i) => h("g", { key: i },
            h("circle", { cx: x(i), cy: y(d.value), r: 3.5, fill: color, stroke: "white", strokeWidth: 1.5 }),
            (i % every === 0 || i === data.length - 1) && h("text", { x: x(i), y: H - 10, fontSize: 10, fill: "#6b7280", textAnchor: "middle" }, (d.date || "").slice(5))
          ))));
    }

        return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();

    // ─── EcranPrimes ──────────────────────────────────────────────────
    function EcranPrimes() {
      var ctx = useAppData();
      var chantiers = ctx.dbChantiers;
      var saisies = ctx.dbSaisies;
      var affectations = ctx.dbAffectations || [];
      var paliers = ctx.dbPaliers || [];
      var parametres = ctx.parametres;
      var personnel = loadPersonnelFromParametres(parametres);

      var _selectedSite = useState("");
      var selectedSite = _selectedSite[0]; var setSelectedSite = _selectedSite[1];
      var _showGrille = useState(false);
      var showGrille = _showGrille[0]; var setShowGrille = _showGrille[1];

      var sites = getAvailableSites(paliers);
      var activeChantiers = chantiers.filter(function(c) { return c.statut === "En cours" || c.statut === "Termine"; });

      // Group chantiers by site
      var chantiersBySite = {};
      activeChantiers.forEach(function(ch) {
        if (!ch.site) return;
        if (!chantiersBySite[ch.site]) chantiersBySite[ch.site] = [];
        chantiersBySite[ch.site].push(ch);
      });

      // ── Periode 25 au 25 ──
      // Pour un mois M donne, la periode va du 25/(M-1) au 24/M
      function getPeriodBounds(year, month) {
        // month is 0-indexed (0=jan)
        var startDate, endDate;
        if (month === 0) {
          startDate = new Date(year - 1, 11, 25); // 25 dec annee precedente
        } else {
          startDate = new Date(year, month - 1, 25);
        }
        endDate = new Date(year, month, 24);
        return { start: startDate, end: endDate };
      }
      function formatISODate(d) {
        var y = d.getFullYear();
        var m = d.getMonth() + 1;
        var day = d.getDate();
        return y + "-" + (m < 10 ? "0" : "") + m + "-" + (day < 10 ? "0" : "") + day;
      }
      function isDateInPeriod(dateStr, start, end) {
        var d = new Date(dateStr + "T00:00:00");
        return d >= start && d <= end;
      }

      // Current period: current month
      var now = new Date();
      var currentPeriod = getPeriodBounds(now.getFullYear(), now.getMonth());
      var periodLabel = "du 25/" + (now.getMonth() === 0 ? "12/" + (now.getFullYear() - 1) : (now.getMonth() < 10 ? "0" : "") + now.getMonth() + "/" + now.getFullYear()) + " au 24/" + (now.getMonth() + 1 < 10 ? "0" : "") + (now.getMonth() + 1) + "/" + now.getFullYear();

      // Calculate prime for a site in a given period
      function calcPrimesForSitePeriod(site, period) {
        var siteCh = chantiersBySite[site] || [];
        if (siteCh.length === 0) return [];
        var results = [];
        personnel.forEach(function(emp) {
          var totalPrime = 0;
          var details = [];
          siteCh.forEach(function(ch) {
            // Affectations in period
            var empAff = affectations.filter(function(a) {
              return a.personnelId === emp.id && a.chantierId === ch.id && isDateInPeriod(a.dateAffectation, period.start, period.end);
            });
            var joursEmp = empAff.length;
            if (joursEmp === 0) return;
            // Metrage in period
            var totalMetrage = 0;
            var totalJours = 0;
            // ── Regles d'arbitrage primes ──
            // 1. Collecter les jours normaux, panne, intemperies du chantier
            var normalDays = []; // { date, val }
            var panneDays = [];
            var intempDays = [];
            if (saisies[ch.id]) {
              var keys = Object.keys(saisies[ch.id]);
              for (var i = 0; i < keys.length; i++) {
                if (!isDateInPeriod(keys[i], period.start, period.end)) continue;
                var sVal = getSaisieVal(saisies[ch.id][keys[i]]);
                var sType = getSaisieType(saisies[ch.id][keys[i]]);
                if (sType === "panne") { panneDays.push({ date: keys[i], val: sVal }); }
                else if (sType === "intemperies") { intempDays.push({ date: keys[i], val: sVal }); }
                else if (sVal > 0) { normalDays.push({ date: keys[i], val: sVal }); }
              }
            }
            // 2. Moyenne du site (configuree dans paliers_primes)
            var siteMoyenne = getMoyenneForSite(paliers, site);
            var normalMetrage = 0;
            for (var ni = 0; ni < normalDays.length; ni++) { normalMetrage += normalDays[ni].val; }
            // 3. Panne rattrappee? auto: metrage normal >= objectif * jours normaux * 9
            var objectif = getObjectifForSite(paliers, site);
            var panneRecovered = normalDays.length > 0 && (normalMetrage / (normalDays.length * 9)) >= objectif;
            // 4. Pannes consecutives detection (regle 5)
            panneDays.sort(function(a, b) { return a.date < b.date ? -1 : 1; });
            // 5. Construire metrage et jours ajustes
            var adjMetrage = normalMetrage;
            var adjJours = normalDays.length;
            // Intemperies: chaque jour = moyenne du site
            adjMetrage += intempDays.length * siteMoyenne;
            adjJours += intempDays.length;
            // Pannes
            if (panneRecovered) {
              // Pas comptabilise: on n'ajoute rien
            } else {
              // Regle 5: si pannes consecutives, 1er jour = moyenne, reste = metrage ecrit
              if (panneDays.length > 1) {
                adjMetrage += siteMoyenne; // 1er jour = moyenne du site
                adjJours += 1;
                for (var pi = 1; pi < panneDays.length; pi++) {
                  adjMetrage += panneDays[pi].val;
                  adjJours += 1;
                }
              } else if (panneDays.length === 1) {
                adjMetrage += panneDays[0].val;
                adjJours += 1;
              }
            }
            // 6. Jours personnel: ferie/conge/chomage = moyenne du dernier site, maladie = 0
            // Pour cet employe, chercher les jours personnel dans la periode
            var empAllAff = affectations.filter(function(a) {
              return a.personnelId === emp.id && isDateInPeriod(a.dateAffectation, period.start, period.end);
            });
            empAllAff.forEach(function(a) {
              var tj = a.typeJour || "travail";
              if (tj === "travail") return; // deja compte dans normalDays via chantier
              // Trouver le dernier site de l'employe avant cette date
              var lastSite = "";
              var sorted = affectations.filter(function(af) {
                return af.personnelId === emp.id && af.chantierId && af.dateAffectation < a.dateAffectation && af.typeJour === "travail";
              }).sort(function(x, y) { return x.dateAffectation > y.dateAffectation ? -1 : 1; });
              if (sorted.length > 0) {
                var lastCh = chantiers.find(function(c) { return c.id === sorted[0].chantierId; });
                lastSite = lastCh ? lastCh.site || "" : "";
              }
              // Ne compter que si le dernier site correspond au site calcule
              if (lastSite !== site) return;
              var moy = getMoyenneForSite(paliers, lastSite);
              if (tj === "ferie" || tj === "conge" || tj === "chomage") {
                adjMetrage += moy;
                adjJours += 1;
              } else if (tj === "maladie") {
                // 0 metrage mais jour compte
                adjJours += 1;
              }
            });
            // Regle 6: si pas travaille du tout ou pas atteint objectif sur rattrapage -> moyenne
            if (adjJours === 0) return;
            var mhRealise = adjMetrage / (adjJours * 9);
            // Regle 6: si mhRealise < objectif et il y avait des pannes non recup, appliquer moyenne du site
            if (!panneRecovered && panneDays.length > 0 && mhRealise < objectif) {
              mhRealise = normalDays.length > 0 ? normalMetrage / (normalDays.length * 9) : 0;
            }
            var coef = lookupCoefficient(paliers, site, mhRealise);
            var diff = mhRealise - objectif;
            var primeChantier = diff > 0 && coef > 0 ? diff * coef : 0;
            totalPrime += primeChantier;
            details.push({ chantier: ch.titre, jours: joursEmp, mhRealise: mhRealise, objectif: objectif, coef: coef, prime: primeChantier });
          });
          if (details.length > 0) {
            results.push({ employe: (emp.prenom || "") + " " + (emp.nom || ""), employeId: emp.id, totalPrime: totalPrime, details: details });
          }
        });
        return results;
      }

      var displaySite = selectedSite || (sites.length > 0 ? sites[0] : "");
      var primeData = displaySite ? calcPrimesForSitePeriod(displaySite, currentPeriod) : [];
      var totalPrimeSite = primeData.reduce(function(s, r) { return s + r.totalPrime; }, 0);

      // ── Recap all sites for current period ──
      var recapByEmployee = {};
      sites.forEach(function(site) {
        var data = calcPrimesForSitePeriod(site, currentPeriod);
        data.forEach(function(row) {
          if (!recapByEmployee[row.employeId]) {
            recapByEmployee[row.employeId] = { employe: row.employe, totalPrime: 0, sites: {} };
          }
          recapByEmployee[row.employeId].totalPrime += row.totalPrime;
          recapByEmployee[row.employeId].sites[site] = row.totalPrime;
        });
      });
      var recapList = Object.keys(recapByEmployee).map(function(k) { return recapByEmployee[k]; });
      recapList.sort(function(a, b) { return b.totalPrime - a.totalPrime; });
      var grandTotal = recapList.reduce(function(s, r) { return s + r.totalPrime; }, 0);
      var avgPrime = recapList.length > 0 ? grandTotal / recapList.length : 0;

      // ── Courbe glissante (commence au mois de deploiement, grandit jusqu'a 12 mois) ──
      var featureStartDate = new Date(2026, 4, 1); // Mai 2026 = mois de deploiement
      var monthsSinceStart = (now.getFullYear() - featureStartDate.getFullYear()) * 12 + (now.getMonth() - featureStartDate.getMonth());
      if (monthsSinceStart < 0) monthsSinceStart = 0;
      var barsCount = Math.min(monthsSinceStart + 1, 12);
      var chartData = [];
      for (var mi = barsCount - 1; mi >= 0; mi--) {
        var chartDate = new Date(now.getFullYear(), now.getMonth() - mi, 1);
        var per = getPeriodBounds(chartDate.getFullYear(), chartDate.getMonth());
        var monthTotal = 0;
        sites.forEach(function(site) {
          var data = calcPrimesForSitePeriod(site, per);
          data.forEach(function(row) { monthTotal += row.totalPrime; });
        });
        var monthName = chartDate.toLocaleDateString("fr-FR", { month: "short" });
        chartData.push({ label: monthName, value: Math.round(monthTotal) });
      }
      var chartMax = Math.max.apply(null, chartData.map(function(d) { return d.value; }).concat([1]));

      var thStyle = { padding: "10px 12px", textAlign: "left", fontWeight: 700, fontSize: 12, color: "#374151", borderBottom: "2px solid #e5e7eb", background: "#f8fafc" };
      var tdStyle = { padding: "10px 12px", borderBottom: "1px solid #f1f5f9", fontSize: 13 };

      return h("div", null,
        h(PageHeader, {
          title: h(IconText, { icon: "trophy", size: 20 }, "Primes de Metrage"),
          subtitle: "Periode " + periodLabel
        }),
        // KPIs
        h("div", { style: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 } },
          h(KPICard, { icon: h(Icon, { name: "wallet", size: 32, color: "#7c3aed" }), label: "Prime totale payable", value: fmtNum(Math.round(grandTotal)) + " XPF", color: "#7c3aed" }),
          h(KPICard, { icon: h(Icon, { name: "users", size: 32, color: "#059669" }), label: "Employes primes", value: String(recapList.length), color: "#059669" }),
          h(KPICard, { icon: h(Icon, { name: "calculator", size: 32, color: "#d97706" }), label: "Prime moyenne", value: fmtNum(Math.round(avgPrime)) + " XPF", color: "#d97706" }),
          h(KPICard, { icon: h(Icon, { name: "map-pin", size: 32, color: "#2563eb" }), label: "Sites actifs", value: String(Object.keys(chantiersBySite).length), color: "#2563eb" })
        ),
        // Courbe 12 mois
        h("div", { style: { background: "white", borderRadius: 12, border: "1px solid var(--border)", padding: 20, marginBottom: 24, boxShadow: "var(--shadow-sm)" } },
          h("div", { style: { fontSize: 14, fontWeight: 700, marginBottom: 16, color: "#374151" } }, "Evolution des primes" + (barsCount < 12 ? " - depuis mai 2026" : " - 12 derniers mois")),
          h("div", { style: { display: "flex", alignItems: "flex-end", gap: 4, height: 160 } },
            chartData.map(function(d, i) {
              var barH = chartMax > 0 ? Math.max(4, (d.value / chartMax) * 140) : 4;
              return h("div", { key: i, style: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 } },
                d.value > 0 ? h("div", { style: { fontSize: 9, fontWeight: 600, color: "#6b7280" } }, fmtNum(d.value)) : null,
                h("div", { style: { width: "100%", maxWidth: 40, height: barH, background: i === chartData.length - 1 ? "#7c3aed" : "#c4b5fd", borderRadius: "4px 4px 0 0", transition: "height 0.3s" } }),
                h("div", { style: { fontSize: 10, fontWeight: 600, color: "#64748b", marginTop: 4 } }, d.label)
              );
            })
          )
        ),
        // ── Tableau recapitulatif par employe (toutes sites) ──
        h("div", { style: { background: "white", borderRadius: 12, border: "1px solid var(--border)", overflow: "hidden", marginBottom: 24, boxShadow: "var(--shadow-sm)" } },
          h("div", { style: { padding: "16px 16px 0", fontSize: 14, fontWeight: 700, color: "#374151" } }, "Recapitulatif par employe - Periode courante"),
          recapList.length === 0 ?
            h("div", { style: { padding: 30, textAlign: "center", color: "#94a3b8", fontSize: 13 } }, "Aucune prime calculee pour cette periode") :
            h("table", { style: { width: "100%", borderCollapse: "collapse", marginTop: 12 } },
              h("thead", null,
                h("tr", null,
                  h("th", { style: thStyle }, "Employe"),
                  sites.map(function(s) { return h("th", { key: s, style: Object.assign({}, thStyle, { textAlign: "right" }) }, s); }),
                  h("th", { style: Object.assign({}, thStyle, { textAlign: "right", color: "#7c3aed" }) }, "Total")
                )
              ),
              h("tbody", null,
                recapList.map(function(row, ri) {
                  return h("tr", { key: ri, style: { background: ri % 2 === 0 ? "white" : "#fafbfc" } },
                    h("td", { style: Object.assign({}, tdStyle, { fontWeight: 600 }) }, row.employe),
                    sites.map(function(s) {
                      var val = row.sites[s] || 0;
                      return h("td", { key: s, style: Object.assign({}, tdStyle, { textAlign: "right", color: val > 0 ? "#059669" : "#94a3b8" }) }, val > 0 ? fmtNum(Math.round(val)) : "-");
                    }),
                    h("td", { style: Object.assign({}, tdStyle, { textAlign: "right", fontWeight: 700, color: "#7c3aed" }) }, fmtNum(Math.round(row.totalPrime)) + " XPF")
                  );

                h("tr", { style: { background: "#f5f3ff" } },
                  h("td", { style: Object.assign({}, tdStyle, { fontWeight: 700, fontSize: 14, borderTop: "2px solid #7c3aed" }) }, "Total"),
                  sites.map(function(s) {

                    return h("td", { key: s, style: Object.assign({}, tdStyle, { textAlign: "right", fontWeight: 700, borderTop: "2px solid #7c3aed" }) }, fmtNum(Math.round(sTotal)));
                  }),
                  h("td", { style: Object.assign({}, tdStyle, { textAlign: "right", fontWeight: 800, fontSize: 14, color: "#7c3aed", borderTop: "2px solid #7c3aed" }) }, fmtNum(Math.round(grandTotal)) + " XPF")
                )

        h("div", { style: { fontSize: 14, fontWeight: 700, color: "#374151", marginBottom: 12 } }, "Detail par site"),

        sites.length > 0 ? h("div", { style: { display: "flex", gap: 8, marginBottom: 16 } },
          sites.map(function(site) {

          h("div", { style: { fontSize: 11, color: "var(--sidebar-text)", marginTop: 2 } }, "Gestion & Suivi")),
        h("nav", { style: { flex: 1, padding: "16px 8px", overflowY: "auto" } },
          sections.map((section) => h("div", { key: section.name },
            h("div", { style: { fontSize: 11, fontWeight: 700, color: "var(--sidebar-text)", textTransform: "uppercase", letterSpacing: 0.5, padding: "12px 14px 8px", marginTop: section.name !== "Principal" ? 8 : 0 } }, section.name),
            section.pages.filter(function(p) { if (p.adminOnly && !isAdmin) return false; if (!isAdmin && allowedPages && allowedPages.indexOf(p.key) < 0) return false; return true; }).map((p) => h("button", { key: p.key, onClick: () => onNavigate(p.key),
              style: { display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 14px", border: "none", borderRadius: 6, marginBottom: 4, cursor: "pointer", fontSize: 14, fontWeight: currentPage === p.key ? 600 : 500, transition: "all 0.2s", background: currentPage === p.key ? "var(--sidebar-active)" : "transparent", color: currentPage === p.key ? "var(--sidebar-text-active)" : "var(--sidebar-text)" } },
              h(Icon, { name: p.lucide, size: 16, color: currentPage === p.key ? "#ffffff" : "#94a3b8" }), p.label,
              p.key === "validations" && pendingCount > 0 ? h("span", { style: { marginLeft: "auto", background: "#dc2626", color: "#fff", fontSize: 11, fontWeight: 700, padding: "2px 7px", borderRadius: 10, minWidth: 20, textAlign: "center" } }, pendingCount) : null))))),
        h("div", { style: { padding: "12px 16px", borderTop: "1px solid rgba(255,255,255,0.1)" } },
          h("div", { style: { fontSize: 11, color: "#94a3b8", marginBottom: 8, wordBreak: "break-all" } }, userEmail || ""),
          h("button", { onClick: onLogout, style: { width: "100%", padding: "8px 12px", background: "transparent", color: "#94a3b8", border: "1px solid #1e293b", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600, transition: "all 0.2s" } }, h(IconText, { icon: "log-out", size: 14, color: "#94a3b8" }, "Deconnexion"))));
    }

    // ─── App principale ─────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [dataLoading, setDataLoading] = useState(false);
      const [currentPage, setCurrentPage] = useState("accueil");
      const [pageData, setPageData] = useState(null);
      const [interventions, setInterventions] = useState([]);
      const [equipements, setEquipements] = useState([]);
      const [plans, setPlans] = useState([]);
      const [pieces, setPieces] = useState([]);
      const [releves, setReleves] = useState([]);
      const [piecesEquipements, setPiecesEquipements] = useState([]);
      const [parametres, setParametres] = useState([]);
      const [dbChantiers, setDbChantiers] = useState([]);
      const [dbSaisies, setDbSaisies] = useState({});
      const [dbDeclarations, setDbDeclarations] = useState([]);
      const [dbRenouvellements, setDbRenouvellements] = useState([]);
      const [dbAppUsers, setDbAppUsers] = useState([]);
      const [dbAffectations, setDbAffectations] = useState([]);
      const [dbPaliers, setDbPaliers] = useState([]);
      const [toast, setToast] = useState({ message: "", type: "success" });

      const showToast = (message, type = "success") => {
        setToast({ message, type });
        setTimeout(() => setToast({ message: "", type }), 3000);
      };

      // Ecoute de la session (login/logout)
      useEffect(() => {
        supabase.auth.getSession().then(({ data }) => { setSession(data.session); setAuthLoading(false); });
        const { data: sub } = supabase.auth.onAuthStateChange((_event, sess) => { setSession(sess); });
        return () => sub.subscription.unsubscribe();
      }, []);

      // Chargement des donnees apres login
      const loadAll = useCallback(async () => {
        setDataLoading(true);
        try {
          const [eqRes, pcRes, plRes, inRes, rlRes, peRes, paRes, chRes, saRes, dcRes, rnRes, auRes] = await Promise.all([
            supabase.from("equipements").select("*").order("immatriculation"),
            supabase.from("pieces").select("*").order("reference"),
            supabase.from("plans").select("*").order("nom"),
            supabase.from("interventions").select("*").order("date_intervention", { ascending: false }),
            supabase.from("releves_horametre").select("*").order("date_releve", { ascending: false }),
            supabase.from("pieces_equipements").select("*"),
            supabase.from("parametres").select("*").order("ordre"),
            supabase.from("chantiers").select("*").order("titre"),
            supabase.from("saisies_metrage").select("*"),
            supabase.from("declarations").select("*").order("date_echeance"),
            supabase.from("renouvellements").select("*").order("date_expiration"),
            supabase.from("app_users").select("*").order("nom"),
          ]);
          // Nouvelles tables (chargement separe pour eviter un crash si migration pas faite)
          var afRes = { data: [], error: null };
          var ppRes = { data: [], error: null };
          try {
            var results = await Promise.all([
              supabase.from("affectations").select("*"),
              supabase.from("paliers_primes").select("*").order("site").order("seuil_mh"),
            ]);
            afRes = results[0];
            ppRes = results[1];
          } catch(e) { console.error("Tables planning/primes non disponibles:", e.message); }
          if (eqRes.error) throw eqRes.error;
          if (pcRes.error) throw pcRes.error;
          if (plRes.error) throw plRes.error;
          if (inRes.error) throw inRes.error;
          if (rlRes.error) throw rlRes.error;
          if (peRes.error) throw peRes.error;
          if (paRes.error) throw paRes.error;
          // New tables: log errors visibly
          if (chRes.error) console.error("Table chantiers:", chRes.error.message);
          if (saRes.error) console.error("Table saisies_metrage:", saRes.error.message);
          if (dcRes.error) console.error("Table declarations:", dcRes.error.message);
          if (rnRes.error) console.error("Table renouvellements:", rnRes.error.message);
          if (auRes.error) console.error("Table app_users:", auRes.error.message);
          if (afRes.error) console.error("Table affectations:", afRes.error.message);
          if (ppRes.error) console.error("Table paliers_primes:", ppRes.error.message);

          const eqList = (eqRes.data || []).map(equipementFromDb);
          const eqCodeById = {}; const eqIdByCode = {};
          eqList.forEach((e) => { eqCodeById[e.Id] = e.Title; eqIdByCode[e.Title] = e.Id; });
          setEquipements(eqList);
          setPieces((pcRes.data || []).map(pieceFromDb));
          setPlans((plRes.data || []).map(planFromDb));
          setInterventions((inRes.data || []).map((r) => interventionFromDb({ ...r, _equipement_code: eqCodeById[r.equipement_id] })));
          setReleves((rlRes.data || []).map((r) => releveFromDb(r, eqCodeById)));
          setPiecesEquipements(peRes.data || []);
          setParametres(paRes.data || []);
          // Chantiers
          setDbChantiers((chRes.data || []).map(chantierFromDb));
          // Saisies: convert array to { chantierId: { dateStr: { valeur, typeJour } } }
          var saisiesMap = {};
          (saRes.data || []).forEach(function(s) {
            if (!saisiesMap[s.chantier_id]) saisiesMap[s.chantier_id] = {};
            saisiesMap[s.chantier_id][s.date_saisie] = { valeur: s.valeur || 0, typeJour: s.type_jour || "normal" };
          });
          setDbSaisies(saisiesMap);
          // Declarations & Renouvellements
          setDbDeclarations((dcRes.data || []).map(declarationFromDb));
          setDbRenouvellements((rnRes.data || []).map(renouvellementFromDb));
          // App Users
          setDbAppUsers((auRes.data || []).map(appUserFromDb));
          // Affectations & Paliers
          setDbAffectations((afRes.data || []).map(affectationFromDb));
          setDbPaliers((ppRes.data || []).map(palierFromDb));
        } catch (e) { showToast("Erreur chargement : " + e.message, "error"); }
        finally { setDataLoading(false); }
      }, []);

      useEffect(() => { if (session) loadAll(); }, [session, loadAll]);

      // Auto-generation des interventions preventives : une seule visite par (equipement, plan)
      // correspondant au DERNIER cycle atteint. Exemple : machine a 1000h avec plan 250h
      // affichera UNIQUEMENT la visite "1000h" (et non 250, 500, 750, 1000).
      // Logique : pour chaque (eq, plan), s'il reste un cycle non termine, on s'assure
      // qu'il existe exactement UNE intervention auto [Auto] Pas fait au cycle courant.
      // Les [Auto] Pas fait obsoletes (cycle inferieur) sont automatiquement nettoyes.
      const [autoGenDone, setAutoGenDone] = useState(false);
      useEffect(() => {
        if (!session || dataLoading || autoGenDone) return;
        if (equipements.length === 0 || plans.length === 0) return;
        const run = async () => {
          const toCreate = [];
          const toUpdate = []; // { id, cycle, freqNum, typeCycle, planTitle }
          const toDelete = []; // ids d'interventions [Auto] Pas fait obsoletes
          equipements.forEach((eq) => {
            const eqCode = (eq.Title || "").toLowerCase();
            const horam = parseFloat(eq.Horametre || 0);
            const km = parseFloat(eq.KM || 0);
            const baseH = parseFloat(eq.DernierEntretienH || 0);
            const baseKM = parseFloat(eq.DernierEntretienKM || 0);

            // 1) Collecter tous les plans dus pour cet equipement (avec baseline)
            var duePlansList = [];
            plans.forEach((p) => {
              if (p.Statut === "Suspendu") return;
              const concerne = !p.Equipements || p.Equipements.toLowerCase().includes(eqCode) || p.Equipements.toLowerCase().includes("tous");
              if (!concerne) return;
              const freq = p.Frequence || "";
              const matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
              const matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);
              let cyclesAtteints = 0, typeCycle = null, freqNum = 0, cyclesBase = 0;
              if (matchH) { freqNum = parseInt(matchH[1]); if (freqNum > 0) { cyclesAtteints = Math.floor(horam / freqNum); cyclesBase = Math.floor(baseH / freqNum); typeCycle = "h"; } }
              else if (matchK) { freqNum = parseInt(matchK[1]); if (freqNum > 0) { cyclesAtteints = Math.floor(km / freqNum); cyclesBase = Math.floor(baseKM / freqNum); typeCycle = "km"; } }
              else return;

              const myInts = interventions.filter((i) =>
                i.Type === "Preventive" &&
                (i.EquipementId === eq.Id || i.Equipement === eq.Title) &&
                (i.Plan || "").toLowerCase() === (p.Title || "").toLowerCase()
              );
              const maxCompleted = myInts
                .filter((i) => i.Statut_Intervention === "Termine")
                .reduce((a, i) => Math.max(a, parseInt(i.CycleNumber || 0)), cyclesBase);
              const pending = myInts.filter((i) =>
                i.Statut_Intervention !== "Termine" && (i.Title || "").startsWith("[Auto]")
              );

              duePlansList.push({ plan: p, freqNum, typeCycle, cyclesAtteints, maxCompleted, pending, isDue: cyclesAtteints > maxCompleted });
            });

            // 2) Hierarchie : si un plan plus gros est aussi du, les petits sont absorbes
            duePlansList.forEach(function(dp) {
              if (!dp.isDue) return;
              dp.absorbed = duePlansList.some(function(other) {
                return other.isDue && other.typeCycle === dp.typeCycle && other.freqNum > dp.freqNum && other.freqNum % dp.freqNum === 0;
              });
            });

            // 3) Appliquer : creer/mettre a jour/supprimer les interventions auto
            duePlansList.forEach(function(dp) {
              var p = dp.plan;
              if (dp.isDue && !dp.absorbed) {
                // Ce plan est du et non absorbe : il faut une intervention auto
                const existingAtMax = dp.pending.find((i) => parseInt(i.CycleNumber || 0) === dp.cyclesAtteints);
                if (existingAtMax) {
                  dp.pending.filter((i) => i !== existingAtMax).forEach((i) => toDelete.push(i.Id));
                } else if (dp.pending.length > 0) {
                  const first = dp.pending[0];
                  toUpdate.push({ id: first.Id, cycle: dp.cyclesAtteints, freqNum: dp.freqNum, typeCycle: dp.typeCycle, planTitle: p.Title });
                  dp.pending.slice(1).forEach((i) => toDelete.push(i.Id));
                } else {
                  toCreate.push({
                    equipement_id: eq.Id,
                    titre: "[Auto] " + p.Title + " - " + (dp.freqNum * dp.cyclesAtteints) + " " + dp.typeCycle,
                    technicien: null,
                    date_intervention: new Date().toISOString().split("T")[0],
                    statut: "pas_fait",
                    travaux_effectues: "Visite preventive auto-generee (seuil " + (dp.freqNum * dp.cyclesAtteints) + " " + dp.typeCycle + " atteint)",
                    temps_arret: null,
                    cout_total: 0,
                    plan_nom: p.Title,
                    horametre: dp.typeCycle === "h" ? dp.freqNum * dp.cyclesAtteints : null,
                    km: dp.typeCycle === "km" ? dp.freqNum * dp.cyclesAtteints : null,
                    type: "preventive",
                    description: "Auto-generee par depassement de seuil",
                    cycle_number: dp.cyclesAtteints,
                  });
                }
              } else {
                // Pas du ou absorbe : nettoyer les [Auto] Pas fait obsoletes
                dp.pending.forEach((i) => toDelete.push(i.Id));
              }
            });
          });

          const totalChanges = toCreate.length + toUpdate.length + toDelete.length;
          if (totalChanges === 0) { setAutoGenDone(true); return; }
          try {
            if (toDelete.length > 0) {
              const { error } = await supabase.from("interventions").delete().in("id", toDelete);
              if (error) throw error;
            }
            for (const u of toUpdate) {
              const newPayload = {
                cycle_number: u.cycle,
                titre: "[Auto] " + u.planTitle + " - " + (u.freqNum * u.cycle) + " " + u.typeCycle,
                travaux_effectues: "Visite preventive auto-generee (seuil " + (u.freqNum * u.cycle) + " " + u.typeCycle + " atteint)",
                horametre: u.typeCycle === "h" ? u.freqNum * u.cycle : null,
                km: u.typeCycle === "km" ? u.freqNum * u.cycle : null,
              };
              const { error } = await supabase.from("interventions").update(newPayload).eq("id", u.id);
              if (error) throw error;
            }
            if (toCreate.length > 0) {
              const { error } = await supabase.from("interventions").insert(toCreate);
              if (error) throw error;
            }
            // Rechargement complet des interventions pour refleter toutes les modifications
            const { data: inRes, error: inErr } = await supabase.from("interventions").select("*").order("date_intervention", { ascending: false });
            if (inErr) throw inErr;
            const eqCodeById = {}; equipements.forEach((e) => { eqCodeById[e.Id] = e.Title; });
            setInterventions((inRes || []).map((r) => interventionFromDb({ ...r, _equipement_code: eqCodeById[r.equipement_id] })));
            const parts = [];
            if (toCreate.length) parts.push(toCreate.length + " creee(s)");
            if (toUpdate.length) parts.push(toUpdate.length + " mise(s) a jour");
            if (toDelete.length) parts.push(toDelete.length + " nettoyee(s)");
            showToast("Visites preventives : " + parts.join(", "), "info");
          } catch (e) {
            showToast("Erreur auto-generation : " + e.message, "error");
          } finally {
            setAutoGenDone(true);
          }
        };
        run();
      }, [session, dataLoading, autoGenDone]);

      const navigate = useCallback((page, data = null) => { setCurrentPage(page); setPageData(data); }, []);

      // Helper : mapping code <-> id equipement
      const eqIdByCode = useMemo(() => {
        const m = {}; equipements.forEach((e) => { m[e.Title] = e.Id; }); return m;
      }, [equipements]);

      // CRUD : Equipements
      const addEquipement = async (item) => {
        const { data, error } = await supabase.from("equipements").insert(equipementToDb(item)).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setEquipements((p) => [...p, equipementFromDb(data)]);
        showToast("Equipement ajoute");
      };
      const updateEquipement = async (item) => {
        const { data, error } = await supabase.from("equipements").update(equipementToDb(item)).eq("id", item.Id).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setEquipements((p) => p.map((x) => (x.Id === item.Id ? equipementFromDb(data) : x)));
        showToast("Equipement mis a jour");
      };
      const deleteEquipement = async (id) => {
        const { error } = await supabase.from("equipements").delete().eq("id", id);
        if (error) { showToast(error.message, "error"); throw error; }
        setEquipements((p) => p.filter((x) => x.Id !== id));
        showToast("Equipement supprime");
      };

      // CRUD : Plans
      const addPlan = async (item) => {
        const { data, error } = await supabase.from("plans").insert(planToDb(item)).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setPlans((p) => [...p, planFromDb(data)]);
        showToast("Plan ajoute");
      };
      const updatePlan = async (item) => {
        const { data, error } = await supabase.from("plans").update(planToDb(item)).eq("id", item.Id).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setPlans((p) => p.map((x) => (x.Id === item.Id ? planFromDb(data) : x)));
        showToast("Plan mis a jour");
      };
      const deletePlan = async (id) => {
        const { error } = await supabase.from("plans").delete().eq("id", id);
        if (error) { showToast(error.message, "error"); throw error; }
        setPlans((p) => p.filter((x) => x.Id !== id));
        showToast("Plan supprime");
      };

      // CRUD : Pieces
      const addPiece = async (item) => {
        const { data, error } = await supabase.from("pieces").insert(pieceToDb(item)).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setPieces((p) => [...p, pieceFromDb(data)]);
        showToast("Piece ajoutee");
      };
      const updatePiece = async (item) => {
        const { data, error } = await supabase.from("pieces").update(pieceToDb(item)).eq("id", item.Id).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setPieces((p) => p.map((x) => (x.Id === item.Id ? pieceFromDb(data) : x)));
        showToast("Piece mise a jour");
      };
      const deletePiece = async (id) => {
        const { error } = await supabase.from("pieces").delete().eq("id", id);
        if (error) { showToast(error.message, "error"); throw error; }
        setPieces((p) => p.filter((x) => x.Id !== id));
        showToast("Piece supprimee");
      };

      // Met a jour le "Dernier entretien H/KM" de l'equipement quand une intervention preventive est terminee
      const maybeUpdateDernierEntretien = async (intervention) => {
        if (intervention.Type !== "Preventive" || intervention.Statut_Intervention !== "Termine" || !intervention.Plan) return;
        const eq = equipements.find(function(e) { return e.Title === intervention.Equipement || e.Id === intervention.EquipementId; });
        if (!eq) return;
        var changed = false;
        var updated = Object.assign({}, eq);
        var intH = parseFloat(intervention.Horametre || 0);
        var intKM = parseFloat(intervention.KM || 0);
        if (intH > 0 && intH > parseFloat(eq.DernierEntretienH || 0)) { updated.DernierEntretienH = String(intH); changed = true; }
        if (intKM > 0 && intKM > parseFloat(eq.DernierEntretienKM || 0)) { updated.DernierEntretienKM = String(intKM); changed = true; }
        if (changed) {
          var dbPayload = equipementToDb(updated);
          var res = await supabase.from("equipements").update(dbPayload).eq("id", eq.Id).select().single();
          if (!res.error && res.data) { setEquipements(function(p) { return p.map(function(x) { return x.Id === eq.Id ? equipementFromDb(res.data) : x; }); }); }
        }
      };

      // CRUD : Interventions
      const addIntervention = async (item) => {
        const payload = interventionToDb(item, eqIdByCode);
        const { data, error } = await supabase.from("interventions").insert(payload).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        const eqCodeById = {}; equipements.forEach((e) => { eqCodeById[e.Id] = e.Title; });
        const newInt = interventionFromDb({ ...data, _equipement_code: eqCodeById[data.equipement_id] });
        setInterventions((p) => [newInt, ...p]);
        showToast("Intervention ajoutee");
        maybeUpdateDernierEntretien(item);
      };
      const updateIntervention = async (item) => {
        const payload = interventionToDb(item, eqIdByCode);
        const { data, error } = await supabase.from("interventions").update(payload).eq("id", item.Id).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        const eqCodeById = {}; equipements.forEach((e) => { eqCodeById[e.Id] = e.Title; });
        setInterventions((p) => p.map((x) => (x.Id === item.Id ? interventionFromDb({ ...data, _equipement_code: eqCodeById[data.equipement_id] }) : x)));
        showToast("Intervention mise a jour");
        maybeUpdateDernierEntretien(item);
      };
      const deleteIntervention = async (id) => {
        const { error } = await supabase.from("interventions").delete().eq("id", id);
        if (error) { showToast(error.message, "error"); throw error; }
        setInterventions((p) => p.filter((x) => x.Id !== id));
        showToast("Intervention supprimee");
      };

      // CRUD : Parametres (listes deroulantes)
      const addParametre = async (categorie, valeur, ordre) => {
        const { data, error } = await supabase.from("parametres").insert({ categorie, valeur, ordre: ordre != null ? parseInt(ordre) : 0 }).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setParametres((p) => [...p, data]);
        showToast("Valeur ajoutee");
      };
      const updateParametre = async (id, patch) => {
        const { data, error } = await supabase.from("parametres").update(patch).eq("id", id).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setParametres((p) => p.map((x) => (x.id === id ? data : x)));
        showToast("Valeur mise a jour");
      };
      const deleteParametre = async (id) => {
        const { error } = await supabase.from("parametres").delete().eq("id", id);
        if (error) { showToast(error.message, "error"); throw error; }
        setParametres((p) => p.filter((x) => x.id !== id));
        showToast("Valeur supprimee");
      };

      // CRUD : Releves
      const addReleve = async (item) => {
        const payload = releveToDb(item, eqIdByCode);
        if (!payload.equipement_id) return;
        const { data, error } = await supabase.from("releves_horametre").insert(payload).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        const eqCodeById = {}; equipements.forEach((e) => { eqCodeById[e.Id] = e.Title; });
        setReleves((p) => [releveFromDb(data, eqCodeById), ...p]);
        // MAJ horametre/km courants de l'equipement si plus recent (admin uniquement cote DB via trigger)
        const eq = equipements.find((e) => e.Id === payload.equipement_id);
        if (eq) {
          const newHor = payload.horametre != null ? payload.horametre : parseFloat(eq.Horametre);
          const newKm = payload.km != null ? payload.km : parseFloat(eq.KM);
          if (newHor > parseFloat(eq.Horametre) || newKm > parseFloat(eq.KM)) {
            // Le trigger SQL bloquera cette MAJ pour les non-admin : on ignore l'erreur.
            const { error: upErr } = await supabase.from("equipements").update({ horametre_actuel: newHor, km_actuel: newKm }).eq("id", eq.Id);
            if (!upErr) {
              setEquipements((list) => list.map((e) => (e.Id === eq.Id ? { ...e, Horametre: String(newHor), KM: String(newKm) } : e)));
            }
            // Si l'admin est absent : le releve est bien enregistre, seule la
            // valeur courante sur l'equipement reste inchangee (non bloquant).
          }
        }
      };
      const deleteReleve = async (id) => {
        const { error } = await supabase.from("releves_horametre").delete().eq("id", id);
        if (error) { showToast(error.message, "error"); throw error; }
        setReleves((p) => p.filter((x) => x.Id !== id));
        showToast("Releve supprime");
      };

      // CRUD : liaisons pieces <-> equipements
      const linkPieceEquipement = async (pieceId, equipementId) => {
        const { data, error } = await supabase.from("pieces_equipements").insert({ piece_id: pieceId, equipement_id: equipementId }).select().single();
        if (error) { showToast(error.message, "error"); throw error; }
        setPiecesEquipements((p) => [...p, data]);
        showToast("Piece liee a l'equipement");
      };
      const unlinkPieceEquipement = async (pieceId, equipementId) => {
        const { error } = await supabase.from("pieces_equipements").delete().eq("piece_id", pieceId).eq("equipement_id", equipementId);
        if (error) { showToast(error.message, "error"); throw error; }
        setPiecesEquipements((p) => p.filter((l) => !(l.piece_id === pieceId && l.equipement_id === equipementId)));
        showToast("Liaison supprimee");
      };

      const logout = async () => { await supabase.auth.signOut(); setSession(null); };

      const userEmail = session && session.user ? session.user.email : "";

      // Determine role & page permissions from dbAppUsers (Supabase)
      var currentAppUser = null;
      for (var ui = 0; ui < dbAppUsers.length; ui++) {
        if ((dbAppUsers[ui].email || "").toLowerCase() === (userEmail || "").toLowerCase()) {
          currentAppUser = dbAppUsers[ui]; break;
        }
      }
      // isAdmin: true if role is "Administrateur" OR if email matches ADMIN_EMAIL (fallback)
      const isAdmin = !!(currentAppUser && currentAppUser.role === "Administrateur") || !!((userEmail || "").toLowerCase() === ADMIN_EMAIL);
      // Allowed pages: admin gets everything, others get only assigned pages
      var allowedPages = null; // null = all pages (admin)
      if (!isAdmin && currentAppUser) {
        allowedPages = currentAppUser.pagesAutorisees || [];
      } else if (!isAdmin && !currentAppUser) {
        allowedPages = ["accueil"]; // unknown user = accueil only
      }

      // Update derniere_connexion on login
      useEffect(function() {
        if (!session || !currentAppUser) return;
        supabase.from("app_users").update({ derniere_connexion: new Date().toISOString() }).eq("id", currentAppUser.id).then(function() {});
      }, [session]);

      // ─── Systeme de validation ──────────────────────────────────────
      const PENDING_KEY = "pending_validations";
      const VALIDATION_LOG_KEY = "validation_log";

      function loadPending() {
        var row = parametres.find(function(p) { return p.categorie === PENDING_KEY; });
        if (row && row.valeur) { try { return JSON.parse(row.valeur); } catch(e) {} }
        return [];
      }
      function loadValidationLog() {
        var row = parametres.find(function(p) { return p.categorie === VALIDATION_LOG_KEY; });
        if (row && row.valeur) { try { return JSON.parse(row.valeur); } catch(e) {} }
        return [];
      }

      const [pendingValidations, setPendingValidationsRaw] = useState(function() { return loadPending(); });
      const [validationLog, setValidationLogRaw] = useState(function() { return loadValidationLog(); });

      // Sync pending from parametres
      useEffect(function() { setPendingValidationsRaw(loadPending()); setValidationLogRaw(loadValidationLog()); }, [parametres]);

      function savePendingToDb(newList) {
        var row = parametres.find(function(p) { return p.categorie === PENDING_KEY; });
        var jsonVal = JSON.stringify(newList);
        if (row) {
          supabase.from("parametres").update({ valeur: jsonVal }).eq("id", row.id).then(function(res) { if (!res.error) row.valeur = jsonVal; });
        } else {
          supabase.from("parametres").insert({ categorie: PENDING_KEY, valeur: jsonVal, ordre: 0 }).select().single().then(function(res) { if (!res.error) parametres.push(res.data); });
        }
      }
      function saveLogToDb(newLog) {
        var row = parametres.find(function(p) { return p.categorie === VALIDATION_LOG_KEY; });
        var jsonVal = JSON.stringify(newLog.slice(0, 50));
        if (row) {
          supabase.from("parametres").update({ valeur: jsonVal }).eq("id", row.id).then(function(res) { if (!res.error) row.valeur = jsonVal; });
        } else {
          supabase.from("parametres").insert({ categorie: VALIDATION_LOG_KEY, valeur: jsonVal, ordre: 0 }).select().single().then(function(res) { if (!res.error) parametres.push(res.data); });
        }
      }

      function addPendingItem(action, entity, data, originalData) {
        var item = { id: Date.now(), action: action, entity: entity, data: data, originalData: originalData || null, submittedBy: userEmail, submittedAt: new Date().toISOString(), status: "pending" };
        var newList = pendingValidations.concat(item);
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        showToast("Soumission envoyee pour validation", "info");
      }

      function approvePending(pid) {
        var item = pendingValidations.find(function(x) { return x.id === pid; });
        if (!item) return;
        var promise;
        if (item.entity === "equipement") {
          if (item.action === "add") promise = addEquipement(item.data);
          else if (item.action === "update") promise = updateEquipement(item.data);
        } else if (item.entity === "intervention") {
          if (item.action === "add") promise = addIntervention(item.data);
          else if (item.action === "update") promise = updateIntervention(item.data);
        } else if (item.entity === "plan") {
          if (item.action === "add") promise = addPlan(item.data);
          else if (item.action === "update") promise = updatePlan(item.data);
        } else if (item.entity === "piece") {
          if (item.action === "add") promise = addPiece(item.data);
          else if (item.action === "update") promise = updatePiece(item.data);
        }
        if (promise) promise.then(function() {
          var newList = pendingValidations.filter(function(x) { return x.id !== pid; });
          setPendingValidationsRaw(newList);
          savePendingToDb(newList);
          var newLog = [{ id: Date.now(), action: item.action, entity: item.entity, summary: item.data.Title || item.data.Reference || "", submittedBy: item.submittedBy, decidedAt: new Date().toISOString(), decision: "approved" }].concat(validationLog);
          setValidationLogRaw(newLog);
          saveLogToDb(newLog);
          showToast("Modification approuvee");
        }).catch(function() {});
      }

      function rejectPending(pid, reason) {
        var item = pendingValidations.find(function(x) { return x.id === pid; });
        if (!item) return;
        var newList = pendingValidations.filter(function(x) { return x.id !== pid; });
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        var newLog = [{ id: Date.now(), action: item.action, entity: item.entity, summary: item.data.Title || item.data.Reference || "", submittedBy: item.submittedBy, decidedAt: new Date().toISOString(), decision: "rejected", reason: reason || "" }].concat(validationLog);
        setValidationLogRaw(newLog);
        saveLogToDb(newLog);
        showToast("Modification refusee");
      }

      function updatePendingItem(pid, newData) {
        var newList = pendingValidations.map(function(x) { return x.id === pid ? Object.assign({}, x, { data: newData }) : x; });
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        showToast("Soumission mise a jour");
      }

      function deletePendingItem(pid) {
        var newList = pendingValidations.filter(function(x) { return x.id !== pid; });
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        showToast("Soumission supprimee");
      }

      // Wrapped CRUD: non-admin goes to pending queue
      const wrappedAddEquipement = isAdmin ? addEquipement : async (item) => { addPendingItem("add", "equipement", item); };
      const wrappedUpdateEquipement = isAdmin ? updateEquipement : async (item) => { addPendingItem("update", "equipement", item, equipements.find((e) => e.Id === item.Id)); };
      const wrappedAddIntervention = isAdmin ? addIntervention : async (item) => { addPendingItem("add", "intervention", item); };
      const wrappedUpdateIntervention = isAdmin ? updateIntervention : async (item) => { addPendingItem("update", "intervention", item, interventions.find((i) => i.Id === item.Id)); };
      const wrappedAddPlan = isAdmin ? addPlan : async (item) => { addPendingItem("add", "plan", item); };
      const wrappedUpdatePlan = isAdmin ? updatePlan : async (item) => { addPendingItem("update", "plan", item, plans.find((p) => p.Id === item.Id)); };
      const wrappedAddPiece = isAdmin ? addPiece : async (item) => { addPendingItem("add", "piece", item); };
      const wrappedUpdatePiece = isAdmin ? updatePiece : async (item) => { addPendingItem("update", "piece", item, pieces.find((p) => p.Id === item.Id)); };

      const contextValue = {
        interventions, equipements, plans, pieces, releves, piecesEquipements, parametres,
        isAdmin, userEmail, pendingValidations, validationLog,
        dbChantiers, setDbChantiers, dbSaisies, setDbSaisies,
        dbDeclarations, setDbDeclarations, dbRenouvellements, setDbRenouvellements,
        dbAppUsers, setDbAppUsers, dbAffectations, setDbAffectations, dbPaliers, setDbPaliers, loadAll, showToast,
        addIntervention: wrappedAddIntervention, updateIntervention: wrappedUpdateIntervention, deleteIntervention,
        addEquipement: wrappedAddEquipement, updateEquipement: wrappedUpdateEquipement, deleteEquipement,
        addPlan: wrappedAddPlan, updatePlan: wrappedUpdatePlan, deletePlan,
        addPiece: wrappedAddPiece, updatePiece: wrappedUpdatePiece, deletePiece,
        addReleve, deleteReleve,
        linkPieceEquipement, unlinkPieceEquipement,
        addParametre, updateParametre, deleteParametre,
        approvePending, rejectPending, updatePendingItem, deletePendingItem,
      };

      if (authLoading) return h("div", { style: { display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh" } }, h("div", { className: "loader" }));
      if (!session) return h(LoginScreen, { onLoggedIn: () => {} });

      const renderPage = () => {
        // Check page access for non-admins
        if (!isAdmin && allowedPages && currentPage !== "accueil" && currentPage !== "fiche-equipement" && allowedPages.indexOf(currentPage) < 0) {
          return h(EcranAccueil, { onNavigate: navigate });
        }
        if (currentPage === "accueil") return h(EcranAccueil, { onNavigate: navigate });
        if (currentPage === "plans") return h(EcranPlans, null);
        if (currentPage === "interventions") return h(EcranInterventions, { onNavigate: navigate, editItem: pageData });
        if (currentPage === "equipements") return h(EcranEquipements, { onNavigate: navigate });
        if (currentPage === "fiche-equipement") return h(EcranFicheEquipement, { onNavigate: navigate, equipement: pageData });
        if (currentPage === "personnel") return h(EcranPersonnel, { onNavigate: navigate });
        if (currentPage === "organisation") return h(EcranOrganisation, { onNavigate: navigate });
        if (currentPage === "validations") return isAdmin ? h(EcranValidations, { onNavigate: navigate }) : h(EcranAccueil, { onNavigate: navigate });
        if (currentPage === "historique") return h(EcranHistorique, { onNavigate: navigate });
        if (currentPage === "pieces") return h(EcranPieces, null);
        if (currentPage === "parametres") return h(EcranParametres, null);
        if (currentPage === "planning") return h(EcranPlanning, null);
        if (currentPage === "avancement") return h(EcranAvancement, null);
        if (currentPage === "planning-employes") return h(EcranPlanningEmployes, null);
        if (currentPage === "primes") return h(EcranPrimes, null);
        if (currentPage === "admin-utilisateurs") return isAdmin ? h(EcranAdminUtilisateurs, null) : h(EcranAccueil, { onNavigate: navigate });
        return h(EcranAccueil, { onNavigate: navigate });
      };

      return h(AppContext.Provider, { value: contextValue },
        h("div", { style: { display: "flex", minHeight: "100vh", background: "var(--bg)", fontFamily: "'Inter', system-ui, -apple-system, sans-serif" } },
          h(Sidebar, { currentPage, onNavigate: navigate, userEmail: session.user && session.user.email, onLogout: logout, isAdmin, pendingCount: pendingValidations.length, allowedPages: allowedPages }),
          h("div", { style: { flex: 1, padding: "24px 32px", overflowY: "auto", maxHeight: "100vh", position: "relative" } },
            dataLoading && h("div", { style: { position: "absolute", top: 20, right: 20, display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#6b7280" } }, h("div", { className: "loader", style: { width: 20, height: 20, borderWidth: 2 } }), "Chargement..."),
            !isAdmin && pendingValidations.filter(function(p) { return p.submittedBy === userEmail; }).length > 0 && h(PendingBannerUser, { pendingValidations: pendingValidations, userEmail: userEmail, updatePendingItem: contextValue.updatePendingItem, deletePendingItem: contextValue.deletePendingItem }),
            renderPage()),
          h(Toast, { message: toast.message, type: toast.type })));
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
