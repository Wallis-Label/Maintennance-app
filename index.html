  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

    // ─── Icones SVG (Lucide) ─────────────────────────────────────────

    function naturalSort(a, b) {

    function getBreakpoint() {
      if (typeof window === "undefined") return "desktop";

      if (w < 640) return "mobile";
      if (w < 1024) return "tablet";

    // ─── Formateurs (nombres + devise) ──────────────────────────────────
    const fmtNum = (n) => {

    };
    const fmtMoney = (n) => fmtNum(n) + " XPF";

    // ─── Mappers (DB snake_case <-> UI PascalCase) ──────────────────────
    const STATUT_EQ_TO_UI = { actif: "En service", en_panne: "En panne", en_maintenance: "En maintenance", reforme: "Reforme" };

    // Partiellement terminee : stocke en DB comme "en_cours" (compat enum), reconstitue en UI via gamme
    const STATUT_INT_TO_DB = { "Termine": "termine", "En cours": "en_cours", "Planifiee": "planifie", "Pas fait": "pas_fait", "Partiellement terminee": "en_cours" };

    }
    function equipementToDb(e) {

      if (e.DernierEntretienH) notesObj.dernierEntretienH = parseFloat(e.DernierEntretienH) || 0;
      if (e.DernierEntretienKM) notesObj.dernierEntretienKM = parseFloat(e.DernierEntretienKM) || 0;

      var notesStr = Object.keys(notesObj).length > 0 ? JSON.stringify(notesObj) : null;
      return { immatriculation: e.Title, nom: e.Nom, type: e.Type, categorie: e.Categorie === "Vehicule" ? "vl" : "engin", localisation: e.Localisation, horametre_actuel: parseFloat(e.Horametre) || 0, km_actuel: parseFloat(e.KM) || 0, statut: STATUT_EQ_TO_DB[e.Statut] || "actif", date_mise_en_service: e.DateMiseEnService || null, marque: e.Marque || null, modele: e.Modele || null, annee: e.Annee ? parseInt(e.Annee) : null, notes: notesStr };

    function parseDescExtra(raw) {
      if (!raw) return { _text: "" };
      try {
        var parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object") return parsed;

      return { _text: raw };

    function interventionFromDb(r) {

    function planToDb(p) {

      return { nom: p.Title, description: descStr, frequence_label: p.Frequence, equipements_codes: p.Equipements, prochaine_execution_date: p.ProchainIntervention || null, statut: STATUT_PLAN_TO_DB[p.Statut] || "actif", type_recurrence: type_rec, frequence: freq_num || 1 };
    }
    function pieceFromDb(r) {
      return { Id: r.id, Reference: r.reference || "", Designation: r.designation || "", Categorie: r.categorie || "", Fournisseur: r.fournisseur || "", PrixUnitaire: String(r.prix_unitaire ?? 0), Stock: String(r.stock_actuel ?? 0), StockMin: String(r.stock_minimum ?? 0), Emplacement: r.emplacement || "", Compatible: r.compatible || "" };

    // ─── Lookup coefficient from paliers ────────────────────────────────
    function lookupCoefficient(pals, site, mhRealise) {
      if (!pals || !pals.length) return 0;
      var sitePaliers = pals.filter(function(p) { return p.site === site; });
      if (sitePaliers.length === 0) return 0;
      sitePaliers.sort(function(a, b) { return a.seuilMh - b.seuilMh; });
      var coef = 0;
      for (var i = 0; i < sitePaliers.length; i++) {
        if (mhRealise >= sitePaliers[i].seuilMh) {
          coef = sitePaliers[i].coefficient;
        }
      }
      return coef;
    }
    function getObjectifForSite(pals, site) {
      if (!pals || !pals.length) return 0;
      var sitePaliers = pals.filter(function(p) { return p.site === site; });
      if (sitePaliers.length === 0) return 0;
      return sitePaliers[0].objectifMh || 0;
    }
    function getAvailableSites(pals) {
      if (!pals || !pals.length) return [];
      var sites = [];
      pals.forEach(function(p) {
        if (sites.indexOf(p.site) < 0) sites.push(p.site);
      });
      return sites;
    }

    function getMoyenneForSite(pals, site) {
      if (!pals || !pals.length || !site) return 0;
      var sitePalier = pals.find(function(p) { return p.site === site; });
      return sitePalier ? sitePalier.moyenneJour || 0 : 0;
    }

    // Auto-creer un site dans paliers_primes si nouveau
    function ensureSiteExists(siteName, paliers, setPaliers, siteConfig) {
      if (!siteName) return;
      var existing = paliers.find(function(p) { return p.site === siteName; });
      if (existing) return;
      var cfg = siteConfig || {};
      var rows = [];
      var paliersList = cfg.paliers || [];
      var objectif = parseFloat(cfg.objectif) || 0;
      var moyenne = parseFloat(cfg.moyenne) || 0;
      if (paliersList.length > 0) {
        paliersList.forEach(function(pl) {
          if (pl.seuil || pl.coef) {
            rows.push({ site: siteName, seuil_mh: parseFloat(pl.seuil) || 0, coefficient: parseInt(pl.coef) || 0, objectif_mh: objectif, moyenne_jour: moyenne });
          }
        });
      }
      if (rows.length === 0) {
        rows.push({ site: siteName, seuil_mh: 0, coefficient: 0, objectif_mh: objectif, moyenne_jour: moyenne });
      }
      supabase.from("paliers_primes").insert(rows).select().then(function(res) {
        if (res.error) { console.error("Erreur creation site palier:", res.error.message); return; }
        setPaliers(paliers.concat((res.data || []).map(palierFromDb)));
      });
    }

    // ─── Helper : calcul des visites preventives en retard ──────────────
    // Pour chaque plan (horametre) lie a l'equipement, on calcule combien
    // de cycles de visite ont ete atteints par l'horametre actuel, et on
    // soustrait le nombre d'interventions preventives deja faites.
    // Calcule le prochain seuil de maintenance pour un plan donne
    // Prochain seuil = prochain multiple de freqVal apres le dernier entretien connu
    // isDue = vrai si le compteur a DEPASSE le seuil (strictement)
    // atThreshold = vrai si le compteur est exactement au seuil
    function computeNextDue(freqVal, freqType, currentVal, baseVal, planInterventions) {
      if (planInterventions.length > 0) {
        var cyclesBase = Math.floor(baseVal / freqVal);
        var maxCompleted = planInterventions.reduce(function(a, i) { return Math.max(a, parseInt(i.CycleNumber || 0)); }, cyclesBase);
        var nextDue = (maxCompleted + 1) * freqVal;
        return { nextDue: nextDue, isDue: currentVal > nextDue, atThreshold: currentVal === nextDue };
      }
      if (baseVal > 0) {
        // Prochain multiple de freqVal apres baseVal
        var cyclesBase2 = Math.floor(baseVal / freqVal);
        var nextDue2 = (cyclesBase2 + 1) * freqVal;
        return { nextDue: nextDue2, isDue: currentVal > nextDue2, atThreshold: currentVal === nextDue2 };
      }
      // Aucun historique : considerer tout comme fait
      var cyclesAtteints = Math.floor(currentVal / freqVal);
      return { nextDue: (cyclesAtteints + 1) * freqVal, isDue: false, atThreshold: false };
    }

    function computeVisitesADeclencher(eq, plans, interventions) {
      if (!eq) return 0;
      const eqCode = (eq.Title || "").toLowerCase();
      const horam = parseFloat(eq.Horametre || 0);
      const km = parseFloat(eq.KM || 0);
      const baseH = parseFloat(eq.DernierEntretienH || 0);
      const baseKM = parseFloat(eq.DernierEntretienKM || 0);

      var duePlans = [];
      plans.forEach((p) => {
        if (p.Statut === "Suspendu") return;
        const concerne = !p.Equipements || p.Equipements.toLowerCase().includes(eqCode) || p.Equipements.toLowerCase().includes("tous");
        if (!concerne) return;
        const freq = p.Frequence || "";
        const matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
        const matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);
        var freqVal = 0, freqType = "";
        if (matchH) { freqVal = parseInt(matchH[1]); freqType = "h"; }
        else if (matchK) { freqVal = parseInt(matchK[1]); freqType = "km"; }
        else return;
        if (freqVal === 0) return;
        var currentVal = freqType === "h" ? horam : km;
        var baseVal = freqType === "h" ? baseH : baseKM;
        var planInts = interventions.filter((i) =>
          i.Type === "Preventive" &&
          (i.EquipementId === eq.Id || i.Equipement === eq.Title) &&
          (i.Plan || "").toLowerCase() === p.Title.toLowerCase() &&
          i.Statut_Intervention === "Termine"
        );
        var result = computeNextDue(freqVal, freqType, currentVal, baseVal, planInts);
        var seuil = parseInt(p.SeuilAlerte || 50);
        var reste = result.nextDue - currentVal;
        if (result.isDue || result.atThreshold || (reste > 0 && reste <= seuil)) {
          duePlans.push({ freqVal: freqVal, freqType: freqType });
        }
      });

      // Deduplique
      var seen = {};
      var uniqueDuePlans = [];
      duePlans.forEach(function(dp) {
        var key = dp.freqType + "_" + dp.freqVal;
        if (!seen[key]) { seen[key] = true; uniqueDuePlans.push(dp); }
      });

      // Hierarchie : si un plan plus gros est aussi du, les petits sont absorbes
      var count = 0;
      uniqueDuePlans.forEach(function(dp) {
        var absorbed = uniqueDuePlans.some(function(other) {
          return other.freqType === dp.freqType && other.freqVal > dp.freqVal && other.freqVal % dp.freqVal === 0;
        });
        if (!absorbed) count++;
      });
      return count;
    }

    // Alertes anticipees : plans qui ne sont pas encore dus mais proches du seuil
    function computeAlertesAnticipees(eq, plans, interventions) {
      if (!eq) return [];
      const eqCode = (eq.Title || "").toLowerCase();
      const horam = parseFloat(eq.Horametre || 0);
      const km = parseFloat(eq.KM || 0);
      const baseH = parseFloat(eq.DernierEntretienH || 0);
      const baseKM = parseFloat(eq.DernierEntretienKM || 0);
      var alertes = [];
      plans.forEach(function(p) {
        if (p.Statut === "Suspendu") return;
        var concerne = !p.Equipements || p.Equipements.toLowerCase().includes(eqCode) || p.Equipements.toLowerCase().includes("tous");
        if (!concerne) return;
        var freq = p.Frequence || "";
        var matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
        var matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);
        var freqVal = 0, freqType = "";
        if (matchH) { freqVal = parseInt(matchH[1]); freqType = "h"; }
        else if (matchK) { freqVal = parseInt(matchK[1]); freqType = "km"; }
        else return;
        if (freqVal === 0) return;
        var currentVal = freqType === "h" ? horam : km;
        var baseVal = freqType === "h" ? baseH : baseKM;
        var planInts = interventions.filter(function(i) {
          return i.Type === "Preventive" && (i.EquipementId === eq.Id || i.Equipement === eq.Title) && (i.Plan || "").toLowerCase() === p.Title.toLowerCase() && i.Statut_Intervention === "Termine";
        });
        var result = computeNextDue(freqVal, freqType, currentVal, baseVal, planInts);
        // Si deja du, pas d'alerte anticipee (c'est gere par computeVisitesADeclencher)
        if (result.isDue || result.atThreshold) return;
        var seuilDecl = parseInt(p.SeuilAlerte || 50);
        var seuilAvenir = parseInt(p.SeuilAlerteAvenir || 0);
        var reste = result.nextDue - currentVal;
        if (seuilAvenir > 0 && reste > seuilDecl && reste <= seuilAvenir) {
          alertes.push({ plan: p.Title, freqVal: freqVal, freqType: freqType, prochainSeuil: result.nextDue, reste: Math.round(reste), unite: freqType === "h" ? "h" : "km" });
        }
      });
      // Hierarchie : si un plan plus gros a aussi une alerte au meme seuil, absorber le petit
      var result = [];
      alertes.forEach(function(a) {
        var absorbed = alertes.some(function(other) {
          return other.freqType === a.freqType && other.freqVal > a.freqVal && other.freqVal % a.freqVal === 0 && other.prochainSeuil === a.prochainSeuil;
        });
        if (!absorbed) result.push(a);
      });
      return result;
    }

    // ─── Helpers Gamme (checklist d'operations) ─────────────────────────
    // Calcule le statut effectif d'une intervention en fonction de sa gamme.
    // - Pas de gamme : retourne le statut brut.
    // - Toutes cases cochees : "Termine".
    // - Au moins une case cochee mais pas toutes : "Partiellement terminee".
    // - Aucune case cochee : retourne le statut brut.
    function computeIntervStatus(interv) {
      if (!interv) return "Planifiee";
      var gamme = Array.isArray(interv.Gamme) ? interv.Gamme : [];
      if (gamme.length === 0) return interv.Statut_Intervention || "Planifiee";
      var done = gamme.filter(function(g) { return g && g.done; }).length;
      if (done === gamme.length) return "Termine";
      if (done > 0) return "Partiellement terminee";
      return interv.Statut_Intervention || "Planifiee";
    }
    // Compte progression gamme : { done, total }

    // ─── Graphique lineaire SVG ────────────────────────────────────────
    function LineChart({ data, color, unit, title }) {
      // data: [{ date, value }] trie par date ascendante
      if (!data || data.length < 2) return null;
      const W = 640, H = 220, pad = { t: 28, r: 16, b: 36, l: 60 };
      const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
      const values = data.map((d) => Number(d.value) || 0);
      const minV = Math.min(...values), maxV = Math.max(...values);
      const rng = Math.max(1, maxV - minV);
      const low = minV - rng * 0.05, high = maxV + rng * 0.05, span = high - low;
      const x = (i) => pad.l + (i / (data.length - 1)) * innerW;
      const y = (v) => pad.t + innerH - ((v - low) / span) * innerH;
      const pts = data.map((d, i) => x(i) + "," + y(d.value)).join(" ");
      const area = "M" + pad.l + "," + (pad.t + innerH) + " L" + data.map((d, i) => x(i) + "," + y(d.value)).join(" L") + " L" + (pad.l + innerW) + "," + (pad.t + innerH) + " Z";
      const yTicks = 4;
      const yTickVals = Array.from({ length: yTicks + 1 }, (_, i) => low + (span * i) / yTicks);

        h("svg", { viewBox: `0 0 ${W} ${H}`, style: { width: "100%", maxWidth: 800, height: "auto", display: "block" } },

          // Zone sous la courbe

          // Points + labels X

        setError(""); setInfo(""); setLoading(true);

          if (mode === "signin") {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            onLoggedIn(data.user);
          } else if (mode === "signup") {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user && !data.session) setInfo("Compte cree ! Verifie ton email pour confirmer.");

            // posee sur le bon domaine. Necessite que cette URL soit dans la liste blanche de Supabase.
            const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname });
            if (error) throw error;
            setInfo("Un email de reinitialisation a ete envoye a " + email + " (verifie aussi les spams).");
          }

          setError(e.message || "Erreur");
        } finally { setLoading(false); }

      function computeUsageRate(eq) {

        if (eqReleves.length < 2) return { hPerDay: 0, kmPerDay: 0, sampleDays: 0, sampleCount: eqReleves.length };
        eqReleves.sort(function(a, b) { return parseDate(a.Date) - parseDate(b.Date); });
        var lastDate = parseDate(eqReleves[eqReleves.length - 1].Date);
        var cutoff = new Date(lastDate.getTime() - 90 * 86400000);
        var windowReleves = eqReleves.filter(function(r) { return parseDate(r.Date) >= cutoff; });
        if (windowReleves.length < 2) windowReleves = eqReleves;
        var first = windowReleves[0];
        var last = windowReleves[windowReleves.length - 1];
        var firstDate = parseDate(first.Date);
        var lastD = parseDate(last.Date);
        var days = Math.max(1, Math.round((lastD - firstDate) / 86400000));
        var dH = parseFloat(last.Horametre || 0) - parseFloat(first.Horametre || 0);
        var dKM = parseFloat(last.KM || 0) - parseFloat(first.KM || 0);
        return {
          hPerDay: Math.max(0, dH / days),
          kmPerDay: Math.max(0, dKM / days),
          sampleDays: days,
          sampleCount: windowReleves.length

      function computeMaintenanceProjections(eq) {
        if (!eq) return [];
        var eqCode = (eq.Title || "").toLowerCase();
        var horam = parseFloat(eq.Horametre || 0);

          var matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
          var matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);

          if (matchH) { freqVal = parseInt(matchH[1]); freqType = "h"; }

          else return;
          if (freqVal === 0) return;
          var currentVal = freqType === "h" ? horam : km;
          var baseVal = freqType === "h" ? baseH : baseKM;
          var planInts = interventionsData.filter(function(i) {

              (i.Plan || "").toLowerCase() === p.Title.toLowerCase() &&
              i.Statut_Intervention === "Termine";
          });
          var result = computeNextDue(freqVal, freqType, currentVal, baseVal, planInts);
          var seuilAlerte = parseInt(p.SeuilAlerte || 50);
          var reste = result.nextDue - currentVal;
          var inSeuil = reste > 0 && reste <= seuilAlerte;
          var rate = freqType === "h" ? usage.hPerDay : usage.kmPerDay;
          var daysUntil = null;
          var projectedDate = null;
          if (result.isDue || result.atThreshold) {
            daysUntil = 0;
            projectedDate = todayLocal;
          } else if (rate > 0) {
            daysUntil = Math.max(0, Math.round(reste / rate));

            atThreshold: result.atThreshold,
            inSeuil: inSeuil,
            daysUntil: daysUntil,
            projectedDate: projectedDate,
            rate: rate,
            sampleCount: usage.sampleCount,

    // ─── Parsers CSV : releves heures + metrage ─────────────────────────
    // Parse une ligne CSV avec quotes (gere virgules dans valeurs quotees)
    function parseCsvLine(line) {

      for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === "," && !inQ) { out.push(cur); cur = ""; }
        else { cur += c; }

      out.push(cur);
      return out;
    }

        var m = lines[i].match(/(\d{2})-(\d{2})-(\d{4})/);

      var seenHeader = false;
      for (var idx = 0; idx < lines.length; idx++) {
        var raw = lines[idx];
        if (!raw || !raw.trim()) continue;
        var cols = parseCsvLine(raw);
        // Detection header
        if (!seenHeader) {
          var first = (cols[0] || "").trim();
          if (first === "Flotte" || first === "Rig") { seenHeader = true; continue; }
          continue;
        }
        var sondeuse = (cols[0] || "").trim();
        var nom = (cols[1] || "").trim();
        var date = (cols[2] || "").trim();
        var heuresEff = parseFr(cols[4]);
        // Ignorer lignes "Total XXX" (sondeuse commence par "Total")
        if (sondeuse.indexOf("Total") === 0) continue;
        if (!sondeuse || !nom || !date) continue;
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
        var key = date + "|" + nom.toUpperCase();
        byKey[key] = { sondeuse: sondeuse, heures: heuresEff };
        allKeys.push(key);

        // Detecter une ligne de site (single col non-vide, pas de date "01/05")
        var nonEmpty = cols.filter(function(c) { return c && c.trim(); });
        if (nonEmpty.length === 1 && !/\d{2}\/\d{2}/.test(nonEmpty[0])) {
          currentSite = nonEmpty[0].trim();
          currentDateCols = null;
          continue;
        }
        // Detecter ligne de header dates : "" puis "01/05","02/05",...
        if (cols[0] !== undefined && (cols[0] === "" || cols[0].trim() === "") && /\d{2}\/\d{2}/.test(cols[1] || "")) {
          currentDateCols = [];
          for (var c = 1; c < cols.length; c++) {
            var dm = (cols[c] || "").trim();
            if (/^\d{2}\/\d{2}$/.test(dm)) {
              var parts = dm.split("/");
              var jour = parts[0]; var mois = parts[1];
              currentDateCols[c] = anneeParDefaut + "-" + mois + "-" + jour;
            } else {
              currentDateCols[c] = null;
            }
          }
          continue;
        }
        // Ligne de donnees employe (necessite site + date cols connus)
        if (!currentSite || !currentDateCols) continue;
        var nom = (cols[0] || "").trim();
        if (!nom) continue;
        for (var c2 = 1; c2 < cols.length && c2 < currentDateCols.length; c2++) {
          var date = currentDateCols[c2];
          if (!date) continue;
          var val = parseFr(cols[c2]);
          if (val === 0) continue; // ne pas creer une ligne pour 0
          var key = date + "|" + nom.toUpperCase();
          byKey[key] = { site: currentSite, metrage: val };
        }
      }
      return { byKey: byKey };
    }
    // Joint les 2 parses sur (date, employé)
    function joindreReleves(heuresParse, metrageParse) {
      var allKeys = {};
      Object.keys(heuresParse.byKey).forEach(function(k) { allKeys[k] = true; });
      Object.keys(metrageParse.byKey).forEach(function(k) { allKeys[k] = true; });
      var rows = [];
      Object.keys(allKeys).forEach(function(k) {
        var h = heuresParse.byKey[k] || {};
        var m = metrageParse.byKey[k] || {};
        var parts = k.split("|");
        rows.push({
          dateReleve: parts[0],
          employeNom: parts[1],
          sondeuseCode: h.sondeuse || "",
          heures: h.heures != null ? h.heures : 0,
          siteNom: m.site || "",
          metrage: m.metrage != null ? m.metrage : 0
        });
      });
      rows.sort(function(a, b) {
        if (a.dateReleve !== b.dateReleve) return a.dateReleve.localeCompare(b.dateReleve);
        return a.employeNom.localeCompare(b.employeNom);

      return rows;
    }
    // Normalise un nom pour matching fuzzy
    function normalizeName(s) {
      return (s || "").toString().toUpperCase().replace(/\s+/g, " ").trim();
    }
    function matchEmploye(nom, personnel) {
      var n = normalizeName(nom);
      for (var i = 0; i < personnel.length; i++) {
        var emp = personnel[i];
        var full1 = normalizeName(emp.prenom + " " + emp.nom);
        var full2 = normalizeName(emp.nom + " " + emp.prenom);
        if (full1 === n || full2 === n) return emp;
      }
      return null;
    }
    function matchEquipement(code, equipements) {
      var c = (code || "").toUpperCase().trim();
      if (!c) return null;
      for (var i = 0; i < equipements.length; i++) {
        var t = (equipements[i].Title || "").toUpperCase().trim();
        if (t === c || t.indexOf(c) === 0 || c.indexOf(t) === 0) return equipements[i];
      }
      return null;
    }
    function matchChantier(siteNom, chantiers) {
      var n = (siteNom || "").toUpperCase().trim();
      if (!n) return null;
      // Match exact sur titre ou site
      for (var i = 0; i < chantiers.length; i++) {
        var t = (chantiers[i].titre || "").toUpperCase();
        var s = (chantiers[i].site || "").toUpperCase();

      }
      return null;

    // Auto-detection chantier - 4 strategies en cascade :
    // 1. Planning Engins (chantier_equipements) : affectation precise par dates
    // 1.5. Memoire des choix manuels precedents (sondeuse + site → chantier)
    // 2. Titre chantier contient le code sondeuse + site match (ex: titre="D36", site="Tiebaghi")
    // 3. Fallback nom de site STRICT (1 seul match accepte)
    function matchChantierAuto(dateStr, equipementId, chantiers, chantierEquipements, siteNomFallback, sondeuseCodeFallback, prefs) {
      // Strategie 1 : croiser equipement + date avec chantier_equipements
      if (equipementId && dateStr && chantierEquipements && chantierEquipements.length > 0) {
        for (var i = 0; i < chantierEquipements.length; i++) {
          var ce = chantierEquipements[i];
          if (ce.equipementId !== equipementId) continue;
          var db = (ce.dateDebut || "").substring(0, 10);
          var df = (ce.dateFin || "").substring(0, 10);
          if (db && df && dateStr >= db && dateStr <= df) {
            var ch = chantiers.find(function(c) { return c.id === ce.chantierId; });
            if (ch) return { chantier: ch, source: "planning" };
          }
        }
      }
      // Strategie 1.5 : memoire des choix manuels precedents
      if (prefs && sondeuseCodeFallback) {
        var prefKey = sondeuseCodeFallback.toUpperCase().trim() + "|" + (siteNomFallback || "").toUpperCase().trim();
        var prefChId = prefs[prefKey];
        if (prefChId) {
          var prefCh = chantiers.find(function(c) { return String(c.id) === String(prefChId); });
          if (prefCh) return { chantier: prefCh, source: "memoire" };
        }
      }
      // Strategie 2 : titre du chantier contient le code sondeuse, et site correspond
      // Ex : titre = "D36" + site = "Tiebaghi" → match unique
      if (sondeuseCodeFallback) {
        var sCode = sondeuseCodeFallback.toUpperCase().trim();
        var siteFilter = (siteNomFallback || "").toUpperCase().trim();
        var byCode = chantiers.filter(function(c) {
          var t = (c.titre || "").toUpperCase();
          if (t.indexOf(sCode) < 0) return false;
          if (siteFilter) {
            var s = (c.site || "").toUpperCase();
            // Le chantier doit etre sur ce site (soit son site soit son titre matche)
            if (s.indexOf(siteFilter) < 0 && t.indexOf(siteFilter) < 0) return false;
          }
          return true;
        });
        if (byCode.length === 1) return { chantier: byCode[0], source: "code-sondeuse" };
        if (byCode.length > 1) {
          // Plusieurs chantiers ont le code sondeuse dans leur titre, prendre le 1er (rare)
          return { chantier: byCode[0], source: "code-sondeuse" };
        }
      }
      // Strategie 3 : nom de site, plusieurs niveaux de precision
      if (siteNomFallback) {
        var n = siteNomFallback.toUpperCase().trim();
        // 3a : match EXACT sur le champ site → priorite max
        var exactSite = chantiers.filter(function(c) {
          return (c.site || "").toUpperCase().trim() === n;
        });
        if (exactSite.length === 1) return { chantier: exactSite[0], source: "site" };
        if (exactSite.length > 1) {
          return { chantier: null, source: "ambigu", ambiguCount: exactSite.length, ambiguList: exactSite.map(function(c) { return c.titre || ("Chantier #" + c.id); }) };
        }

        var partial = chantiers.filter(function(c) {
          var t = (c.titre || "").toUpperCase();
          var s = (c.site || "").toUpperCase();
          return t.indexOf(n) >= 0 || s.indexOf(n) >= 0;
        });
        if (partial.length === 1) return { chantier: partial[0], source: "site" };
        if (partial.length > 1) {
          return { chantier: null, source: "ambigu", ambiguCount: partial.length, ambiguList: partial.map(function(c) { return c.titre || ("Chantier #" + c.id); }) };
        }
      }
      return null;
    }

      function isSiteEnCours(s) { return sitesEnCours.indexOf(s) >= 0; }

      // ── Periode du 26 au 25 ──
      // Pour un mois M donne, la periode va du 26/(M-1) au 25/M
      function getPeriodBounds(year, month) {
        // month is 0-indexed (0=jan)
        var startDate, endDate;
        if (month === 0) {

        }
        endDate = new Date(year, month, 25);
        return { start: startDate, end: endDate };
      }
      function formatISODate(d) {
        var y = d.getFullYear();

        var day = d.getDate();

      }

      // Current period: based on selected month
      var now = new Date();
      var currentPeriod = getPeriodBounds(selectedMonth.getFullYear(), selectedMonth.getMonth());

      var prevM = sm === 0 ? 12 : sm;
      var prevY = sm === 0 ? sy - 1 : sy;

      // Calculate prime for a site in a given period
      function calcPrimesForSitePeriod(site, period) {

        var results = [];
        var siteMoyenne = getMoyenneForSite(paliers, site);
        var objectif = getObjectifForSite(paliers, site);

        personnel.forEach(function(emp) {
          var empNom = ((emp.prenom || "") + " " + (emp.nom || "")).toUpperCase().trim();
          var empNomRev = ((emp.nom || "") + " " + (emp.prenom || "")).toUpperCase().trim();
          var totalPrime = 0;

          // ── Stratégie 1 : utiliser releves_journaliers (machine + site) si disponibles ──
          var empReleves = releves.filter(function(r) {
            if (!r.dateReleve) return false;
            if (!isDateInPeriod(r.dateReleve, period.start, period.end)) return false;

            if (!r.chantierId || siteChIds.indexOf(r.chantierId) < 0) return false;
            // Match employe : personnel_id si renseigne, sinon nom

            Object.keys(byMachine).forEach(function(k) {
              var b = byMachine[k];

              var coef = lookupCoefficient(paliers, site, mhRealise);
              var diff = mhRealise - objectif;
              var prime = diff > 0 && coef > 0 ? diff * coef : 0;

              var displayName = chTitre;

                mhRealise: mhRealise,
                objectif: objectif,
                coef: coef,

              });

              if (effectiveType === "panne" || effectiveType === "intemperies" || effectiveType === "non_productif") {
                adjMetrage += siteMoyenne;
                adjJours += 1;

    // ─── App principale ─────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(null);
      const [recoveryMode, setRecoveryMode] = useState(false);
      const [authLoading, setAuthLoading] = useState(true);
      const [dataLoading, setDataLoading] = useState(false);
      const [currentPage, setCurrentPage] = useState("accueil");
      const [pageData, setPageData] = useState(null);
      const [interventions, setInterventions] = useState([]);
      const [equipements, setEquipements] = useState([]);
      const [plans, setPlans] = useState([]);
      const [pieces, setPieces] = useState([]);
      const [releves, setReleves] = useState([]);
      const [piecesEquipements, setPiecesEquipements] = useState([]);
      const [parametres, setParametres] = useState([]);
      const [dbChantiers, setDbChantiers] = useState([]);
      const [dbSaisies, setDbSaisies] = useState({});
      const [dbDeclarations, setDbDeclarations] = useState([]);
      const [dbRenouvellements, setDbRenouvellements] = useState([]);
      const [dbAppUsers, setDbAppUsers] = useState([]);
      const [dbAffectations, setDbAffectations] = useState([]);
      const [dbPaliers, setDbPaliers] = useState([]);
      const [dbChantierEquipements, setDbChantierEquipements] = useState([]);
      const [dbDemandesFin, setDbDemandesFin] = useState([]);
      const [dbRelevesJourn, setDbRelevesJourn] = useState([]);
      const [toast, setToast] = useState({ message: "", type: "success" });

      const showToast = (message, type = "success") => {
        setToast({ message, type });
        setTimeout(() => setToast({ message: "", type }), 3000);
      };

      // Ecoute de la session (login/logout/password-recovery)
      useEffect(() => {
        supabase.auth.getSession().then(({ data }) => { setSession(data.session); setAuthLoading(false); });
        const { data: sub } = supabase.auth.onAuthStateChange((event, sess) => {
          if (event === "PASSWORD_RECOVERY") setRecoveryMode(true);
          setSession(sess);
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      // Chargement des donnees apres login
      const loadAll = useCallback(async () => {
        setDataLoading(true);
        try {
          const [eqRes, pcRes, plRes, inRes, rlRes, peRes, paRes, chRes, saRes, dcRes, rnRes, auRes] = await Promise.all([
            supabase.from("equipements").select("*").order("immatriculation"),
            supabase.from("pieces").select("*").order("reference"),
            supabase.from("plans").select("*").order("nom"),
            supabase.from("interventions").select("*").order("date_intervention", { ascending: false }),
            supabase.from("releves_horametre").select("*").order("date_releve", { ascending: false }),
            supabase.from("pieces_equipements").select("*"),
            supabase.from("parametres").select("*").order("ordre"),
            supabase.from("chantiers").select("*").order("titre"),
            supabase.from("saisies_metrage").select("*"),
            supabase.from("declarations").select("*").order("date_debut_periode"),
            supabase.from("renouvellements").select("*").order("date_expiration"),
            supabase.from("app_users").select("*").order("nom"),
          ]);
          // Nouvelles tables (chargement separe pour eviter un crash si migration pas faite)
          var afRes = { data: [], error: null };
          var ppRes = { data: [], error: null };
          var ceRes = { data: [], error: null };
          var dfRes = { data: [], error: null };
          var rjRes = { data: [], error: null };
          try {
            var results = await Promise.all([
              supabase.from("affectations").select("*"),
              supabase.from("paliers_primes").select("*").order("site").order("seuil_mh"),
              supabase.from("chantier_equipements").select("*"),
              supabase.from("demandes_financement").select("*").order("created_at", { ascending: false }),
              supabase.from("releves_journaliers").select("*").order("date_releve", { ascending: false }),
            ]);
            afRes = results[0];
            ppRes = results[1];
            ceRes = results[2];
            dfRes = results[3];
            rjRes = results[4];
          } catch(e) { console.error("Tables planning/primes non disponibles:", e.message); }
          if (eqRes.error) throw eqRes.error;
          if (pcRes.error) throw pcRes.error;
          if (plRes.error) throw plRes.error;
          if (inRes.error) throw inRes.error;
          if (rlRes.error) throw rlRes.error;
          if (peRes.error) throw peRes.error;
          if (paRes.error) throw paRes.error;
          // New tables: log errors visibly
          if (chRes.error) console.error("Table chantiers:", chRes.error.message);
          if (saRes.error) console.error("Table saisies_metrage:", saRes.error.message);
          if (dcRes.error) console.error("Table declarations:", dcRes.error.message);
          if (rnRes.error) console.error("Table renouvellements:", rnRes.error.message);
          if (auRes.error) console.error("Table app_users:", auRes.error.message);
          if (afRes.error) console.error("Table affectations:", afRes.error.message);
          if (ppRes.error) console.error("Table paliers_primes:", ppRes.error.message);
          if (ceRes.error) console.error("Table chantier_equipements:", ceRes.error.message);
          if (dfRes.error) console.error("Table demandes_financement:", dfRes.error.message);
          if (rjRes.error) console.error("Table releves_journaliers:", rjRes.error.message);

          const eqList = (eqRes.data || []).map(equipementFromDb);
          const eqCodeById = {}; const eqIdByCode = {};
          eqList.forEach((e) => { eqCodeById[e.Id] = e.Title; eqIdByCode[e.Title] = e.Id; });
          setEquipements(eqList);
          setPieces((pcRes.data || []).map(pieceFromDb));
          setPlans((plRes.data || []).map(planFromDb));
          setInterventions((inRes.data || []).map((r) => interventionFromDb({ ...r, _equipement_code: eqCodeById[r.equipement_id] })));
          setReleves((rlRes.data || []).map((r) => releveFromDb(r, eqCodeById)));
          setPiecesEquipements(peRes.data || []);
          setParametres(paRes.data || []);
          // Chantiers
          setDbChantiers((chRes.data || []).map(chantierFromDb));
          // Saisies: convert array to { chantierId: { dateStr: { valeur, typeJour } } }
          var saisiesMap = {};
          (saRes.data || []).forEach(function(s) {
            if (!saisiesMap[s.chantier_id]) saisiesMap[s.chantier_id] = {};
            saisiesMap[s.chantier_id][s.date_saisie] = { valeur: s.valeur || 0, typeJour: s.type_jour || "normal" };

        finally { setDataLoading(false); }
      }, []);

      useEffect(() => { if (session) loadAll(); }, [session, loadAll]);

      // Auto-generation des interventions preventives : une seule visite par (equipement, plan)
      // correspondant au DERNIER cycle atteint. Exemple : machine a 1000h avec plan 250h
      // affichera UNIQUEMENT la visite "1000h" (et non 250, 500, 750, 1000).
      // Logique : pour chaque (eq, plan), s'il reste un cycle non termine, on s'assure
      // qu'il existe exactement UNE intervention auto [Auto] Pas fait au cycle courant.
      // Les [Auto] Pas fait obsoletes (cycle inferieur) sont automatiquement nettoyes.
      const [autoGenDone, setAutoGenDone] = useState(false);
      useEffect(() => {
        if (!session || dataLoading || autoGenDone) return;
        if (equipements.length === 0 || plans.length === 0) return;
        const run = async () => {
          const toCreate = [];
          const toUpdate = []; // { id, cycle, freqNum, typeCycle, planTitle }
          const toDelete = []; // ids d'interventions [Auto] Pas fait obsoletes
          equipements.forEach((eq) => {
            const eqCode = (eq.Title || "").toLowerCase();
            const horam = parseFloat(eq.Horametre || 0);
            const km = parseFloat(eq.KM || 0);
            const baseH = parseFloat(eq.DernierEntretienH || 0);
            const baseKM = parseFloat(eq.DernierEntretienKM || 0);

            // 1) Collecter tous les plans dus pour cet equipement (relatif au dernier entretien)
            var duePlansList = [];
            plans.forEach((p) => {
              if (p.Statut === "Suspendu") return;
              const concerne = !p.Equipements || p.Equipements.toLowerCase().includes(eqCode) || p.Equipements.toLowerCase().includes("tous");
              if (!concerne) return;
              const freq = p.Frequence || "";
              const matchH = freq.match(/horametre\s*(\d+)/i) || freq.match(/^(\d+)\s*h/i);
              const matchK = freq.match(/km\s*(\d+)/i) || freq.match(/(\d+)\s*km/i);
              var freqNum = 0, typeCycle = null;
              if (matchH) { freqNum = parseInt(matchH[1]); if (freqNum > 0) typeCycle = "h"; }
              else if (matchK) { freqNum = parseInt(matchK[1]); if (freqNum > 0) typeCycle = "km"; }
              else return;
              if (freqNum === 0) return;

              var currentVal = typeCycle === "h" ? horam : km;
              var baseVal = typeCycle === "h" ? baseH : baseKM;

              const myInts = interventions.filter((i) =>
                i.Type === "Preventive" &&
                (i.EquipementId === eq.Id || i.Equipement === eq.Title) &&
                (i.Plan || "").toLowerCase() === (p.Title || "").toLowerCase()
              );
              var terminatedInts = myInts.filter((i) => i.Statut_Intervention === "Termine");
              const pending = myInts.filter((i) =>
                i.Statut_Intervention !== "Termine" && (i.Title || "").startsWith("[Auto]")
              );

              var result = computeNextDue(freqNum, typeCycle, currentVal, baseVal, terminatedInts);
              var seuilDecl = parseInt(p.SeuilAlerte || 50);
              var reste = result.nextDue - currentVal;
              var isDue = result.isDue || result.atThreshold;
              var inSeuil = !isDue && reste > 0 && reste <= seuilDecl;

              duePlansList.push({ plan: p, freqNum: freqNum, typeCycle: typeCycle, pending: pending, isDue: isDue, inSeuil: inSeuil, nextDue: result.nextDue });
            });

            // 2) Hierarchie : si un plan plus gros est aussi du ou dans seuil, les petits sont absorbes
            duePlansList.forEach(function(dp) {
              if (!dp.isDue && !dp.inSeuil) return;
              dp.absorbed = duePlansList.some(function(other) {
                return (other.isDue || other.inSeuil) && other.typeCycle === dp.typeCycle && other.freqNum > dp.freqNum && other.freqNum % dp.freqNum === 0;
              });
            });

            // 3) Appliquer : creer/mettre a jour/supprimer les interventions auto
            duePlansList.forEach(function(dp) {
              var p = dp.plan;
              if ((dp.isDue || dp.inSeuil) && !dp.absorbed) {
                var targetVal = dp.nextDue;
                var targetCycle = Math.ceil(targetVal / dp.freqNum);
                const existingAtTarget = dp.pending.find((i) => parseInt(i.CycleNumber || 0) === targetCycle);
                if (existingAtTarget) {
                  dp.pending.filter((i) => i !== existingAtTarget).forEach((i) => toDelete.push(i.Id));
                } else if (dp.pending.length > 0) {
                  const first = dp.pending[0];
                  toUpdate.push({ id: first.Id, cycle: targetCycle, freqNum: dp.freqNum, typeCycle: dp.typeCycle, planTitle: p.Title, targetVal: targetVal });
                  dp.pending.slice(1).forEach((i) => toDelete.push(i.Id));
                } else {
                  // Copier la gamme du plan (si definie) dans la nouvelle intervention auto
                  var planGamme = Array.isArray(p.Gamme) ? p.Gamme : [];
                  var gammeForInterv = planGamme.map(function(g) {
                    return { id: g.id || ("g" + Date.now() + "_" + Math.floor(Math.random() * 1000)), label: g.label || "", done: false, fromPlan: true };
                  });
                  var travauxObj = { _text: "Visite preventive auto-generee (seuil " + targetVal + " " + dp.typeCycle + " atteint)" };
                  if (gammeForInterv.length > 0) travauxObj.gamme = gammeForInterv;
                  var travauxStr = JSON.stringify(travauxObj);
                  toCreate.push({
                    equipement_id: eq.Id,
                    titre: "[Auto] " + p.Title + " - " + targetVal + " " + dp.typeCycle,
                    technicien: null,
                    date_intervention: new Date().toISOString().split("T")[0],
                    statut: "pas_fait",
                    travaux_effectues: travauxStr,
                    temps_arret: null,
                    cout_total: 0,
                    plan_nom: p.Title,
                    horametre: dp.typeCycle === "h" ? targetVal : null,
                    km: dp.typeCycle === "km" ? targetVal : null,
                    type: "preventive",
                    description: dp.isDue ? "Auto-generee par depassement de seuil" : "Auto-generee par approche du seuil de declenchement",
                    cycle_number: targetCycle,
                  });
                }
              } else {
                // Pas du, pas dans seuil, ou absorbe : nettoyer les [Auto] Pas fait obsoletes
                dp.pending.forEach((i) => toDelete.push(i.Id));
              }
            });
          });

          const totalChanges = toCreate.length + toUpdate.length + toDelete.length;
          if (totalChanges === 0) { setAutoGenDone(true); return; }
          try {
            if (toDelete.length > 0) {
              const { error } = await supabase.from("interventions").delete().in("id", toDelete);
              if (error) throw error;
            }
            for (const u of toUpdate) {
              var uTargetVal = u.targetVal || (u.freqNum * u.cycle);
              const newPayload = {
                cycle_number: u.cycle,
                titre: "[Auto] " + u.planTitle + " - " + uTargetVal + " " + u.typeCycle,

              };
              const { error } = await supabase.from("interventions").update(newPayload).eq("id", u.id);
              if (error) throw error;
            }
            if (toCreate.length > 0) {
              const { error } = await supabase.from("interventions").insert(toCreate);
              if (error) throw error;
            }
            // Rechargement complet des interventions pour refleter toutes les modifications
            const { data: inRes, error: inErr } = await supabase.from("interventions").select("*").order("date_intervention", { ascending: false });
            if (inErr) throw inErr;
            const eqCodeById = {}; equipements.forEach((e) => { eqCodeById[e.Id] = e.Title; });
            setInterventions((inRes || []).map((r) => interventionFromDb({ ...r, _equipement_code: eqCodeById[r.equipement_id] })));
            const parts = [];
            if (toCreate.length) parts.push(toCreate.length + " creee(s)");
            if (toUpdate.length) parts.push(toUpdate.length + " mise(s) a jour");
            if (toDelete.length) parts.push(toDelete.length + " nettoyee(s)");
            showToast("Visites preventives : " + parts.join(", "), "info");
          } catch (e) {
            showToast("Erreur auto-generation : " + e.message, "error");
          } finally {
            setAutoGenDone(true);
          }
        };
        run();

      const VALIDATION_LOG_KEY = "validation_log";

      function loadPending() {
        var row = parametres.find(function(p) { return p.categorie === PENDING_KEY; });
        if (row && row.valeur) { try { return JSON.parse(row.valeur); } catch(e) {} }
        return [];
      }
      function loadValidationLog() {
        var row = parametres.find(function(p) { return p.categorie === VALIDATION_LOG_KEY; });
        if (row && row.valeur) { try { return JSON.parse(row.valeur); } catch(e) {} }
        return [];
      }

      const [pendingValidations, setPendingValidationsRaw] = useState(function() { return loadPending(); });
      const [validationLog, setValidationLogRaw] = useState(function() { return loadValidationLog(); });

      // Sync pending from parametres
      useEffect(function() { setPendingValidationsRaw(loadPending()); setValidationLogRaw(loadValidationLog()); }, [parametres]);

      function savePendingToDb(newList) {
        var row = parametres.find(function(p) { return p.categorie === PENDING_KEY; });
        var jsonVal = JSON.stringify(newList);
        if (row) {
          supabase.from("parametres").update({ valeur: jsonVal }).eq("id", row.id).then(function(res) { if (!res.error) row.valeur = jsonVal; });
        } else {
          supabase.from("parametres").insert({ categorie: PENDING_KEY, valeur: jsonVal, ordre: 0 }).select().single().then(function(res) { if (!res.error) parametres.push(res.data); });
        }
      }
      function saveLogToDb(newLog) {
        var row = parametres.find(function(p) { return p.categorie === VALIDATION_LOG_KEY; });
        var jsonVal = JSON.stringify(newLog.slice(0, 50));
        if (row) {
          supabase.from("parametres").update({ valeur: jsonVal }).eq("id", row.id).then(function(res) { if (!res.error) row.valeur = jsonVal; });
        } else {
          supabase.from("parametres").insert({ categorie: VALIDATION_LOG_KEY, valeur: jsonVal, ordre: 0 }).select().single().then(function(res) { if (!res.error) parametres.push(res.data); });
        }
      }

      function addPendingItem(action, entity, data, originalData) {
        var item = { id: Date.now(), action: action, entity: entity, data: data, originalData: originalData || null, submittedBy: userEmail, submittedAt: new Date().toISOString(), status: "pending" };
        var newList = pendingValidations.concat(item);
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        showToast("Soumission envoyee pour validation", "info");
      }

      function approvePending(pid) {
        var item = pendingValidations.find(function(x) { return x.id === pid; });
        if (!item) return;
        var promise;
        if (item.entity === "equipement") {
          if (item.action === "add") promise = addEquipement(item.data);
          else if (item.action === "update") promise = updateEquipement(item.data);
        } else if (item.entity === "intervention") {
          if (item.action === "add") promise = addIntervention(item.data);
          else if (item.action === "update") promise = updateIntervention(item.data);
        } else if (item.entity === "plan") {
          if (item.action === "add") promise = addPlan(item.data);
          else if (item.action === "update") promise = updatePlan(item.data);
        } else if (item.entity === "piece") {
          if (item.action === "add") promise = addPiece(item.data);
          else if (item.action === "update") promise = updatePiece(item.data);
        }
        if (promise) promise.then(function() {
          var newList = pendingValidations.filter(function(x) { return x.id !== pid; });
          setPendingValidationsRaw(newList);
          savePendingToDb(newList);
          var newLog = [{ id: Date.now(), action: item.action, entity: item.entity, summary: item.data.Title || item.data.Reference || "", submittedBy: item.submittedBy, decidedAt: new Date().toISOString(), decision: "approved" }].concat(validationLog);
          setValidationLogRaw(newLog);
          saveLogToDb(newLog);
          showToast("Modification approuvee");
        }).catch(function() {});
      }

      function rejectPending(pid, reason) {
        var item = pendingValidations.find(function(x) { return x.id === pid; });
        if (!item) return;
        var newList = pendingValidations.filter(function(x) { return x.id !== pid; });
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        var newLog = [{ id: Date.now(), action: item.action, entity: item.entity, summary: item.data.Title || item.data.Reference || "", submittedBy: item.submittedBy, decidedAt: new Date().toISOString(), decision: "rejected", reason: reason || "" }].concat(validationLog);
        setValidationLogRaw(newLog);
        saveLogToDb(newLog);
        showToast("Modification refusee");
      }

      function updatePendingItem(pid, newData) {
        var newList = pendingValidations.map(function(x) { return x.id === pid ? Object.assign({}, x, { data: newData }) : x; });
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        showToast("Soumission mise a jour");
      }

      function deletePendingItem(pid) {
        var newList = pendingValidations.filter(function(x) { return x.id !== pid; });
        setPendingValidationsRaw(newList);
        savePendingToDb(newList);
        showToast("Soumission supprimee");
      }

      // Wrapped CRUD: non-admin goes to pending queue
      const wrappedAddEquipement = isAdmin ? addEquipement : async (item) => { addPendingItem("add", "equipement", item); };
      const wrappedUpdateEquipement = isAdmin ? updateEquipement : async (item) => { addPendingItem("update", "equipement", item, equipements.find((e) => e.Id === item.Id)); };
      const wrappedAddIntervention = isAdmin ? addIntervention : async (item) => { addPendingItem("add", "intervention", item); };
      const wrappedUpdateIntervention = isAdmin ? updateIntervention : async (item) => { addPendingItem("update", "intervention", item, interventions.find((i) => i.Id === item.Id)); };
      const wrappedAddPlan = isAdmin ? addPlan : async (item) => { addPendingItem("add", "plan", item); };
      const wrappedUpdatePlan = isAdmin ? updatePlan : async (item) => { addPendingItem("update", "plan", item, plans.find((p) => p.Id === item.Id)); };
      const wrappedAddPiece = isAdmin ? addPiece : async (item) => { addPendingItem("add", "piece", item); };
      const wrappedUpdatePiece = isAdmin ? updatePiece : async (item) => { addPendingItem("update", "piece", item, pieces.find((p) => p.Id === item.Id)); };

      const contextValue = {
        interventions, equipements, plans, pieces, releves, piecesEquipements, parametres, setParametres,
        isAdmin, userEmail, pendingValidations, validationLog,
        dbChantiers, setDbChantiers, dbSaisies, setDbSaisies,
        dbDeclarations, setDbDeclarations, dbRenouvellements, setDbRenouvellements,
        dbAppUsers, setDbAppUsers, dbAffectations, setDbAffectations, dbPaliers, setDbPaliers,
        dbChantierEquipements, setDbChantierEquipements, addChantierEquipement, updateChantierEquipement, deleteChantierEquipement,
        dbDemandesFin, setDbDemandesFin, addDemandeFin, updateDemandeFin, deleteDemandeFin,
        dbRelevesJourn, setDbRelevesJourn, upsertRelevesJourn, deleteReleveJourn,
        loadAll, showToast,
        addIntervention: wrappedAddIntervention, updateIntervention: wrappedUpdateIntervention, deleteIntervention,
        addEquipement: wrappedAddEquipement, updateEquipement: wrappedUpdateEquipement, deleteEquipement,
        addPlan: wrappedAddPlan, updatePlan: wrappedUpdatePlan, deletePlan,
        addPiece: wrappedAddPiece, updatePiece: wrappedUpdatePiece, deletePiece,
        addReleve, deleteReleve,
        linkPieceEquipement, unlinkPieceEquipement,
        addParametre, updateParametre, deleteParametre,
        approvePending, rejectPending, updatePendingItem, deletePendingItem,
      };

      // ── Hooks responsive : DOIVENT etre appeles avant tout early return (Rules of Hooks) ──
      var bpInfo = useBreakpoint();
      var _sidebarOpen = useState(false);
      var sidebarOpen = _sidebarOpen[0]; var setSidebarOpen = _sidebarOpen[1];
      useEffect(function() {
        if (!bpInfo.isMobile && sidebarOpen) setSidebarOpen(false);
      }, [bpInfo.isMobile]);

      if (authLoading) return h("div", { style: { display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh" } }, h("div", { className: "loader" }));
      if (recoveryMode) return h(RecoveryPasswordScreen, { onDone: () => { setRecoveryMode(false); setSession(null); } });
      if (!session) return h(LoginScreen, { onLoggedIn: () => {} });

      const renderPage = () => {
        // Check page access for non-admins
        if (!isAdmin && allowedPages && currentPage !== "accueil" && currentPage !== "fiche-equipement" && allowedPages.indexOf(currentPage) < 0) {
          return h(EcranAccueil, { onNavigate: navigate });
        }
        if (currentPage === "accueil") return h(EcranAccueil, { onNavigate: navigate });
        if (currentPage === "plans") return h(EcranPlans, null);
        if (currentPage === "interventions") return h(EcranInterventions, { onNavigate: navigate, editItem: pageData });
        if (currentPage === "equipements") return h(EcranEquipements, { onNavigate: navigate });
        if (currentPage === "fiche-equipement") return h(EcranFicheEquipement, { onNavigate: navigate, equipement: pageData });
        if (currentPage === "personnel") return h(EcranPersonnel, { onNavigate: navigate });
        if (currentPage === "pieces") return h(EcranPieces, null);
        if (currentPage === "financement") return h(EcranFinancement, { onNavigate: navigate });
        if (currentPage === "planning") return h(EcranPlanning, null);
        if (currentPage === "avancement") return h(EcranAvancement, null);
        if (currentPage === "planning-employes") return h(EcranPlanningEmployes, null);
        if (currentPage === "primes") return h(EcranPrimes, null);
        if (currentPage === "administration") return h(EcranAdministration, { onNavigate: navigate, pendingCount: pendingValidations.length });
        return h(EcranAccueil, { onNavigate: navigate });
      };

      // Padding adaptatif (bpInfo defini plus haut)
      var mainPadding = bpInfo.isMobile ? "16px 12px 80px" : bpInfo.isTablet ? "20px 20px" : "24px 32px";

      return h(AppContext.Provider, { value: contextValue },
        h("div", { style: { display: "flex", minHeight: "100vh", background: "var(--bg)", fontFamily: "'Inter', system-ui, -apple-system, sans-serif" } },
          // Overlay derriere le drawer mobile (clic ferme)
          bpInfo.isMobile && sidebarOpen ? h("div", { onClick: function() { setSidebarOpen(false); }, style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", backdropFilter: "blur(4px)", zIndex: 998 } }) : null,
          h(Sidebar, { currentPage, onNavigate: navigate, userEmail: session.user && session.user.email, onLogout: logout, isAdmin, pendingCount: pendingValidations.length, demandesFinPending: (function() { var u = session.user && session.user.email; return (dbDemandesFin || []).filter(function(d) { return (isAdmin || d.demandeurEmail === u) && (d.statut === "soumise" || (d.statut === "info_demandee" && (isAdmin || d.demandeurEmail === u))); }).length; }()), allowedPages: allowedPages, isMobile: bpInfo.isMobile, isOpen: sidebarOpen, onClose: function() { setSidebarOpen(false); } }),
          h("div", { style: { flex: 1, padding: mainPadding, overflowY: "auto", maxHeight: "100vh", position: "relative", width: "100%", minWidth: 0 } },
            // Bouton hamburger sur mobile (en haut a gauche, fixed)
            bpInfo.isMobile ? h("button", { onClick: function() { setSidebarOpen(true); }, "aria-label": "Ouvrir le menu", style: { position: "fixed", top: 12, left: 12, width: 40, height: 40, padding: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(36, 40, 60, 0.85)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#fafafa", cursor: "pointer", zIndex: 997, boxShadow: "0 4px 12px rgba(0,0,0,0.4)" } }, h(Icon, { name: "menu", size: 20, color: "#fafafa" })) : null,
            // Decalage sous le bouton hamburger sur mobile
            bpInfo.isMobile ? h("div", { style: { height: 44 } }) : null,
            dataLoading && h("div", { style: { position: "absolute", top: bpInfo.isMobile ? 60 : 20, right: 20, display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#a1a1aa" } }, h("div", { className: "loader", style: { width: 20, height: 20, borderWidth: 2 } }), "Chargement..."),
            !isAdmin && (pendingValidations.filter(function(p) { return p.submittedBy === userEmail; }).length > 0 || validationLog.filter(function(l) { return l.submittedBy === userEmail; }).length > 0) && h(PendingBannerUser, { pendingValidations: pendingValidations, userEmail: userEmail, updatePendingItem: contextValue.updatePendingItem, deletePendingItem: contextValue.deletePendingItem }),
            renderPage()),
          h(Toast, { message: toast.message, type: toast.type })));
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
